services:
  - type: cron
    name: iinvestment-tracker-cron
    runtime: python
    autoDeploy: false          # 每小時資料 push 不重建，改動 cron 程式碼時才手動部署
    buildCommand: pip install -r cron/requirements.txt
    startCommand: python cron/trigger.py
    schedule: "0 * * * *"   # 每整點觸發一次
    envVars:
      - key: GH_TOKEN
        sync: false          # 在 Render dashboard 手動填入 GitHub PAT
