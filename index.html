<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>投資小幫手</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  /* ══ PROFESSIONAL DARK THEME ══════════════════════════════════════════════ */
  :root {
    --up:   #ef4444;   /* red-500  */
    --down: #22c55e;   /* green-500 */
    --flat: #64748b;   /* slate-500 */
    --bg:   #0f172a;   /* slate-900 — page bg */
    --c1:   #1e293b;   /* slate-800 — card bg */
    --c2:   #263545;   /* card hover / alt row */
    --bdr:  #334155;   /* slate-700 — border */
    --t1:   #e2e8f0;   /* slate-200 — primary text */
    --t2:   #94a3b8;   /* slate-400 — secondary text */
    --t3:   #64748b;   /* slate-500 — muted text */
    --acc:  #3b82f6;   /* blue-500 — accent */
    --acc2: rgba(59,130,246,.09);
  }

  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--t1);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
  }

  /* ── TOP BAR ─────────────────────────────────────────────────── */
  .top-bar {
    background: #080f1d;
    border-bottom: 1px solid var(--bdr);
    color: var(--t1); padding: .55rem 1rem;
    position: sticky; top: 0; z-index: 99;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 16px rgba(0,0,0,.5);
  }
  .top-bar h1 {
    font-size: 1rem; font-weight: 700; margin: 0;
    letter-spacing: .02em; color: var(--t1);
  }
  .top-bar .time-badge {
    font-size: .7rem; background: var(--c2);
    border: 1px solid var(--bdr); border-radius: 5px;
    padding: .18rem .6rem; white-space: nowrap;
    color: var(--t2); font-family: 'Courier New', monospace;
  }
  .top-bar-btns { display: flex; align-items: center; gap: .45rem; }
  .top-bar-btns button {
    background: var(--c2) !important; border: 1px solid var(--bdr) !important;
    border-radius: 5px !important; color: var(--t2) !important;
    font-size: .75rem !important; padding: .2rem .7rem !important;
    cursor: pointer; display: flex; align-items: center; gap: .3rem;
    transition: border-color .15s, color .15s;
  }
  .top-bar-btns button:hover { border-color: var(--acc) !important; color: var(--t1) !important; }
  .top-bar-btns button:disabled { opacity: .5; cursor: not-allowed; }

  /* ── MARKET TABS ─────────────────────────────────────────────── */
  .market-tabs { background: #080f1d; border-bottom: 1px solid var(--bdr); }
  .market-tabs .nav-link {
    font-size: .9rem; font-weight: 600; letter-spacing: .04em;
    padding: .7rem 1.4rem;
    border-radius: 0; border-bottom: 2px solid transparent;
    color: var(--t3); transition: color .15s, background .15s;
  }
  .market-tabs .nav-link.active {
    color: var(--acc); border-bottom-color: var(--acc);
    background: var(--acc2);
  }
  .market-tabs .nav-link:hover:not(.active) { color: var(--t2); background: var(--c2); }
  .badge-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .dot-us { background: #f59e0b; } .dot-tw { background: #10b981; } .dot-jp { background: #f43f5e; }

  /* ── SECTION TITLE ───────────────────────────────────────────── */
  .section-title {
    font-size: .67rem; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--t3);
    padding: .8rem 1rem .35rem;
    display: flex; align-items: center; gap: .5rem;
  }
  .section-title::before {
    content: ''; display: inline-block; width: 2px; height: .85em;
    background: var(--acc); border-radius: 2px; flex-shrink: 0;
  }

  /* ── INDEX CARDS ─────────────────────────────────────────────── */
  .idx-card {
    background: var(--c1); border: 1px solid var(--bdr);
    border-radius: 10px; padding: .95rem 1.1rem;
    margin: .35rem .7rem; transition: border-color .2s;
  }
  .idx-card:hover { border-color: var(--acc); }
  .idx-name  { font-size: .72rem; color: var(--t3); font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
  .idx-price { font-size: 2rem; font-weight: 800; margin: .3rem 0 .05rem; letter-spacing: -.02em; }
  .idx-chg   { font-size: .9rem; font-weight: 500; }

  .up   { color: var(--up); }
  .down { color: var(--down); }
  .flat { color: var(--flat); }

  /* ── STOCK CARDS ─────────────────────────────────────────────── */
  .stock-card {
    background: var(--c1); border: 1px solid var(--bdr);
    border-radius: 10px; padding: .8rem 1rem;
    margin: .35rem .7rem;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; transition: border-color .2s;
  }
  .stock-card:hover { border-color: #2d4f70; }
  .stock-name  { font-size: .9rem; font-weight: 700; color: var(--t1); }
  .stock-sub   { font-size: .68rem; color: var(--t3); margin-top: 2px; }
  .stock-price { font-size: 1.35rem; font-weight: 800; text-align: right; letter-spacing: -.01em; }
  .chg-badge {
    display: inline-block; font-size: .72rem; font-weight: 700;
    padding: .18rem .55rem; border-radius: 4px; margin-top: 5px;
    font-family: 'Courier New', monospace;
  }
  .chg-badge.up   { background: rgba(239,68,68,.12);  color: var(--up); }
  .chg-badge.down { background: rgba(34,197,94,.12);   color: var(--down); }
  .chg-badge.flat { background: var(--c2); color: var(--flat); }

  /* ── SIGNALS ─────────────────────────────────────────────────── */
  .sig-bar {
    width: 100%; border-top: 1px solid var(--bdr);
    padding-top: .28rem; margin-top: .22rem;
    display: flex; flex-direction: column; gap: .15rem;
  }
  .sig-row   { display: flex; align-items: center; gap: .35rem; font-size: .67rem; }
  .sig-label { color: var(--t3); font-weight: 700; font-size: .59rem; min-width: 1.4rem; }
  .sig-sep   { color: var(--bdr); }
  .sig-val   { font-family: 'Courier New', monospace; font-weight: 600; }
  .sig-buy     { color: var(--down); }
  .sig-sell    { color: var(--up); }
  .sig-neutral { color: var(--t3); font-weight: 400; }

  /* ── ETF NAV ─────────────────────────────────────────────────── */
  .nav-bar {
    width: 100%; border-top: 1px solid var(--bdr);
    padding-top: .24rem; margin-top: .2rem;
    font-size: .7rem; color: var(--t3);
    display: flex; align-items: center; gap: .4rem;
  }
  .nav-prem { font-weight: 700; }

  /* ── ETF 法人 ────────────────────────────────────────────────── */
  .inst-bar {
    width: 100%; border-top: 1px solid var(--bdr);
    padding-top: .24rem; margin-top: .2rem;
    font-size: .67rem; display: flex; align-items: center; gap: .4rem; flex-wrap: wrap;
  }
  .inst-lbl  { color: var(--t3); font-size: .59rem; }
  .inst-sep  { color: var(--bdr); }
  .inst-up   { color: var(--up);   font-weight: 700; font-family: 'Courier New', monospace; }
  .inst-dn   { color: var(--down); font-weight: 700; font-family: 'Courier New', monospace; }
  .inst-flat { color: var(--t3);   font-family: 'Courier New', monospace; }

  /* ── ETF HOLDINGS ────────────────────────────────────────────── */
  .holding-table { width: 100%; border-collapse: collapse; font-size: .72rem; }
  .holding-table th { color: var(--t3); font-weight: 600; font-size: .64rem; padding: .25rem .4rem; text-align: left; border-bottom: 1px solid var(--bdr); }
  .holding-table th.r { text-align: right; }
  .holding-table td { padding: .25rem .4rem; border-top: 1px solid var(--bdr); color: var(--t2); }
  .holding-table td.r { text-align: right; font-family: 'Courier New', monospace; }
  .holding-in  { background: rgba(34,197,94,.08);  color: var(--down) !important; }
  .holding-out { background: rgba(239,68,68,.08);   opacity: .7; text-decoration: line-through; }
  .diff-badge { font-size: .6rem; font-weight: 700; background: rgba(251,191,36,.12); color: #fbbf24; padding: .1rem .4rem; border-radius: 99px; margin-left: .35rem; }

  /* ── ETF CHANGES ─────────────────────────────────────────────── */
  .etfc-note  { font-size: .62rem; color: var(--t3); text-align: right; padding: .2rem .9rem .1rem; }
  .etfc-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: .4rem; padding: .2rem .5rem; }
  .etfc-section { background: var(--card-bg); border-radius: .55rem; padding: .4rem .55rem .5rem; border: 1px solid var(--bdr); }
  .etfc-sec-hd { font-size: .68rem; font-weight: 700; padding-bottom: .3rem; margin-bottom: .25rem; border-bottom: 1px solid var(--bdr); }
  .etfc-sec-hd.in  { color: var(--down); }
  .etfc-sec-hd.out { color: var(--up);   }
  .etfc-sec-hd.up  { color: #2563eb;    }
  .etfc-sec-hd.dn  { color: #7c3aed;    }
  .etfc-row   { display: flex; align-items: baseline; gap: .3rem; padding: .2rem 0; border-top: 1px solid var(--bdr); font-size: .7rem; flex-wrap: wrap; }
  .etfc-code  { font-weight: 700; color: var(--t1); min-width: 2.8rem; flex-shrink: 0; }
  .etfc-name  { color: var(--t2); flex: 1; min-width: 4rem; font-size: .65rem; }
  .etfc-tags  { display: flex; flex-wrap: wrap; gap: .2rem; }
  .etfc-date  { font-size: .6rem; color: var(--t3); margin-left: auto; flex-shrink: 0; }
  .etfc-tag   { font-size: .58rem; font-weight: 600; padding: .05rem .3rem; border-radius: 99px; white-space: nowrap; }
  .etfc-tag-in  { background: rgba(34,197,94,.12);  color: var(--down); }
  .etfc-tag-out { background: rgba(239,68,68,.12);  color: var(--up);   }
  .etfc-tag-up  { background: rgba(37,99,235,.10);  color: #2563eb;    }
  .etfc-tag-dn  { background: rgba(124,58,237,.10); color: #7c3aed;    }
  .etfc-empty { text-align: center; color: var(--t3); padding: 1rem; font-size: .78rem; }
  .etfc-none  { color: var(--t3); font-size: .68rem; padding: .3rem 0; }
  @media (max-width: 480px) { .etfc-grid { grid-template-columns: 1fr; } }

  /* ── MARGIN RANK ─────────────────────────────────────────────── */
  .mrank-wrap { margin: .2rem .7rem .5rem; background: var(--c1); border: 1px solid var(--bdr); border-radius: 10px; overflow: hidden; }
  .mrank-header { display: flex; justify-content: space-between; align-items: center; padding: .5rem .75rem .35rem; border-bottom: 1px solid var(--bdr); }
  .mrank-title { font-size: .72rem; font-weight: 700; color: var(--t1); letter-spacing: .03em; }
  .mrank-date  { font-size: .64rem; color: var(--t3); }
  .mrank-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .mrank-col   { padding: .3rem .6rem .5rem; }
  .mrank-col:first-child { border-right: 1px solid var(--bdr); }
  .mrank-col-title { font-size: .67rem; font-weight: 700; padding: .15rem 0 .3rem; }
  .mrank-col-title.add { color: var(--up); }
  .mrank-col-title.sub { color: var(--down); }
  .mrank-row { display: flex; justify-content: space-between; align-items: center; padding: .1rem 0; border-top: 1px solid var(--c2); font-size: .69rem; }
  .mrank-code { color: var(--t2); font-weight: 600; min-width: 2.8rem; }
  .mrank-name { color: var(--t3); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0 .3rem; font-size: .64rem; }
  .mrank-chg  { font-family: 'Courier New', monospace; font-size: .67rem; white-space: nowrap; }

  /* ── ANALYSIS CARD ───────────────────────────────────────────── */
  .an-card {
    background: var(--c1); border: 1px solid var(--bdr);
    border-radius: 10px; padding: 1rem;
    margin: .35rem .7rem;
  }
  .an-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .7rem; }
  .an-name  { font-size: .95rem; font-weight: 700; color: var(--t1); }
  .an-sub   { font-size: .7rem; color: var(--t3); }
  .an-price { font-size: 1.65rem; font-weight: 800; letter-spacing: -.02em; }

  .an-bias { width: 100%; border-collapse: collapse; font-size: .8rem; margin-bottom: .65rem; }
  .an-bias th { color: var(--t3); font-weight: 600; padding: .2rem .3rem; text-align: center; font-size: .68rem; border-bottom: 1px solid var(--bdr); }
  .an-bias td { padding: .22rem .3rem; text-align: center; color: var(--t2); }
  .an-bias .row-lbl { text-align: left; font-weight: 600; color: var(--t2); white-space: nowrap; }
  .an-bias .ma-val  { color: var(--t2); font-size: .76rem; }

  /* 乖離率色階（深色版）*/
  .b-0      { color: var(--t2); }
  .b-pos    { color: var(--up); }
  .b-neg    { color: var(--down); }
  .b-pos-10 { background: rgba(239,68,68,.14);  color: #fca5a5; font-weight: 700; border-radius: 4px; padding: .08rem .3rem; display: inline-block; }
  .b-neg-10 { background: rgba(34,197,94,.14);   color: #86efac; font-weight: 700; border-radius: 4px; padding: .08rem .3rem; display: inline-block; }
  .b-pos-15 { background: rgba(239,68,68,.22);  color: #fca5a5; font-weight: 700; border-radius: 4px; padding: .08rem .3rem; display: inline-block; }
  .b-neg-15 { background: rgba(34,197,94,.22);   color: #86efac; font-weight: 700; border-radius: 4px; padding: .08rem .3rem; display: inline-block; }
  .b-pos-20 { background: rgba(239,68,68,.32);  color: #fecaca; font-weight: 700; border-radius: 4px; padding: .08rem .3rem; display: inline-block; }
  .b-neg-20 { background: rgba(34,197,94,.32);   color: #bbf7d0; font-weight: 700; border-radius: 4px; padding: .08rem .3rem; display: inline-block; }
  .b-pos-25 { background: rgba(239,68,68,.55);  color: #fff;    font-weight: 700; border-radius: 4px; padding: .08rem .3rem; display: inline-block; }
  .b-neg-25 { background: rgba(34,197,94,.55);   color: #fff;    font-weight: 700; border-radius: 4px; padding: .08rem .3rem; display: inline-block; }

  .an-vol { font-size: .77rem; color: var(--t2); border-top: 1px solid var(--bdr); padding-top: .5rem; }
  .an-vol-title { font-weight: 700; color: var(--t2); margin-bottom: .25rem; font-size: .72rem; }
  .vol-hi { color: var(--up);   font-weight: 600; }
  .vol-lo { color: var(--down); font-weight: 600; }

  /* ── GRID ────────────────────────────────────────────────────── */
  @media(min-width:768px){
    .idx-grid   { display: grid; grid-template-columns: repeat(2,1fr); }
    .stock-grid { display: grid; grid-template-columns: repeat(2,1fr); }
    .an-grid    { display: grid; grid-template-columns: repeat(2,1fr); }
    .idx-card, .stock-card, .an-card { margin: .35rem; }
    .stock-name  { font-size: 1rem; }
    .stock-price { font-size: 1.35rem; }
  }
  @media(min-width:1200px){
    .idx-grid   { grid-template-columns: repeat(4,1fr); }
    .stock-grid { grid-template-columns: repeat(3,1fr); }
  }

  /* ── BOTTOM BAR ──────────────────────────────────────────────── */
  .update-bar {
    background: #080f1d; border-top: 1px solid var(--bdr);
    text-align: center; padding: .55rem;
    font-size: .72rem; color: var(--t3); position: sticky; bottom: 0;
  }

  /* ── SESSION TAGS ────────────────────────────────────────────── */
  .session-tag { font-size: .63rem; font-weight: 700; padding: .1rem .42rem; border-radius: 4px; margin-left: .4rem; vertical-align: middle; }
  .tag-live { background: rgba(34,197,94,.15);  color: var(--down); }
  .tag-wait { background: rgba(251,191,36,.15); color: #fbbf24; }

  /* ── SKELETON ────────────────────────────────────────────────── */
  .skeleton {
    background: linear-gradient(90deg, var(--c1) 25%, var(--c2) 50%, var(--c1) 75%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite;
    border-radius: 6px; height: 1.2em; width: 70%;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .spin { display: inline-block; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FUTURES ─────────────────────────────────────────────────── */
  .futures-updated { font-size: .68rem; color: var(--t3); font-weight: 400; margin-left: .5rem; }

  /* ── EPS / FUND TOGGLE ───────────────────────────────────────── */
  .eps-toggle-btn {
    background: none; border: none; cursor: pointer;
    font-size: .67rem; font-weight: 700; letter-spacing: .09em;
    text-transform: uppercase; color: var(--t3);
    padding: .7rem 1rem .4rem;
    display: flex; align-items: center; gap: .4rem; width: 100%;
    transition: color .15s;
  }
  .eps-toggle-btn:hover { color: var(--t2); }
  .eps-toggle-icon { transition: transform .2s; font-size: .85rem; }
  .eps-toggle-icon.open { transform: rotate(90deg); }
  .eps-body { display: none; }
  .eps-body.open { display: block; }
  .eps-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: .3rem .7rem 0; }
  .eps-table { width: 100%; border-collapse: collapse; font-size: .79rem; }
  .eps-table th {
    background: var(--c2); color: var(--t2); font-weight: 700;
    padding: .4rem .55rem; text-align: right; white-space: nowrap;
    border-bottom: 1px solid var(--bdr); font-size: .68rem; position: sticky; top: 0;
  }
  .eps-table th:first-child { text-align: left; min-width: 90px; }
  .eps-table td { padding: .35rem .55rem; text-align: right; border-bottom: 1px solid var(--bdr); vertical-align: middle; color: var(--t2); }
  .eps-table td:first-child { text-align: left; }
  .eps-table tr:hover { background: var(--c2); }
  .eps-name { font-weight: 600; color: var(--t1); font-size: .85rem; line-height: 1.2; }
  .eps-sym  { color: var(--t3); font-size: .68rem; }
  .eps-fy   { color: var(--t3); font-size: .65rem; }
  .eps-val  { color: var(--t2); }
  .eps-up   { color: var(--up);   font-weight: 600; }
  .eps-down { color: var(--down); font-weight: 600; }
  .eps-pub  { background: rgba(59,130,246,.15); color: #60a5fa; font-weight: 700; border-radius: 3px; padding: .04rem .3rem; display: inline-block; }
  .eps-est  { color: #a78bfa; font-style: italic; }
  .eps-note { font-size: .64rem; color: var(--t3); display: block; margin-top: 1px; white-space: nowrap; }
  .eps-null { color: var(--bdr); }
  .eps-footer { font-size: .67rem; color: var(--t3); text-align: right; padding: .3rem 1rem .5rem; }

  /* ── FUNDAMENTALS ────────────────────────────────────────────── */
  .fund-good { color: var(--down); font-weight: 600; }
  .fund-warn { color: var(--up);   font-weight: 600; }
  .fund-null { color: var(--bdr); }
  .fund-group { background: var(--c2); color: var(--t3); font-weight: 700; font-size: .7rem; padding: .3rem .55rem; }

  /* ── K-LINE MODAL ────────────────────────────────────────────── */
  #chart-modal {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: #080f1d; flex-direction: column;
  }
  #chart-header {
    display: flex; align-items: center; gap: .5rem;
    padding: .5rem .85rem; border-bottom: 1px solid var(--bdr); flex-shrink: 0;
    flex-wrap: wrap;
  }
  #chart-title { color: var(--t1); font-size: .9rem; font-weight: 700; white-space: nowrap; }
  #chart-ohlc  { flex: 1; font-size: .7rem; color: var(--t2); font-family: 'Courier New', monospace;
    min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #chart-close { margin-left: auto; background: none; border: none; color: var(--t3);
    font-size: 1.5rem; line-height: 1; cursor: pointer; padding: 0 .2rem; flex-shrink: 0; }
  #chart-close:hover { color: var(--t1); }
  #chart-container { flex: 1; min-height: 0; width: 100%; }

  .btn-chart {
    background: var(--c2); border: 1px solid var(--bdr); border-radius: 4px;
    color: var(--t2); font-size: .64rem; padding: .1rem .42rem; cursor: pointer; white-space: nowrap;
    transition: border-color .15s, color .15s;
  }
  .btn-chart:hover { border-color: var(--acc); color: var(--acc); }
  .btn-chart-card {
    background: var(--c2); border: 1px solid var(--bdr); border-radius: 4px;
    color: var(--t3); font-size: .63rem; padding: .08rem .3rem; cursor: pointer; flex-shrink: 0;
    transition: border-color .15s, color .15s;
  }
  .btn-chart-card:hover { border-color: var(--acc); color: var(--acc); }

  /* ── STOCK MARGIN IN MODAL ───────────────────────────────────── */
  #stock-margin-section {
    flex-shrink: 0; flex-direction: column; background: #080f1d;
    border-top: 1px solid var(--bdr);
  }
  #stock-margin-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: .3rem .75rem; font-size: .7rem; color: var(--t3);
  }
  #stock-margin-chart { height: 130px; width: 100%; }

  /* ── INLINE CHART PANEL (台股大盤區) ─────────────────────────── */
  .tw-chart-panel {
    margin: .2rem .7rem .5rem; background: var(--c1);

  /* ── INSTITUTIONAL RANK ──────────────────────────────────────── */
  .irank-summary {
    margin: .2rem .7rem .15rem;

  .irank-tabs {

  .irank-grid  { display: grid; grid-template-columns: 1fr 1fr; margin: 0 .7rem .2rem; gap: .4rem; }
  .irank-col   { background: var(--c1); border: 1px solid var(--bdr); border-radius: 8px; overflow: hidden; }

<script>
// ── 時鐘 / Tab ────────────────────────────────────────────────────────────────
function twNow() {
  return new Date(new Date().toLocaleString('en-US', {timeZone:'Asia/Taipei'}));
}
function updateClock() {
  const d = twNow(), p = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent =
    `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function updateTags() {
  const m = twNow().getHours()*60 + twNow().getMinutes();
  const set = (id, text, cls) => {
    const el = document.getElementById(id);
    el.textContent = text; el.className = 'session-tag ' + (cls||'');
  };
  set('us-tag', m>=6*60&&m<14*60 ? '已更新' : '', m>=6*60&&m<14*60 ? 'tag-wait' : '');
  set('tw-tag', m>=9*60&&m<13*60+30 ? '盤中' : m>=13*60+30&&m<17*60 ? '已收盤' : '',
      m>=9*60&&m<13*60+30 ? 'tag-live' : 'tag-wait');
  set('jp-tag', m>=8*60&&m<14*60+30 ? '盤中' : m>=14*60+30&&m<17*60 ? '已收盤' : '',
      m>=8*60&&m<14*60+30 ? 'tag-live' : 'tag-wait');
}
function initTab() {
  // 預設美股
  bootstrap.Tab.getOrCreateInstance(document.getElementById('us-tab')).show();
}
function switchToLatest(us, tw, jp) {
  // 資料載入後切換到最近更新的市場
  const parse = s => s ? new Date(s.replace(/\//g,'-').replace(' ','T')) : new Date(0);
  const latest = [
    { id:'us-tab', t: parse(us.updated) },
    { id:'tw-tab', t: parse(tw.updated) },
    { id:'jp-tab', t: parse(jp.updated) },
  ].sort((a,b) => b.t - a.t)[0];
  bootstrap.Tab.getOrCreateInstance(document.getElementById(latest.id)).show();
}

// ── 渲染 ─────────────────────────────────────────────────────────────────────
function cls(pct) { return pct===null ? 'flat' : pct>0 ? 'up' : pct<0 ? 'down' : 'flat'; }
function arrow(pct) { return pct===null ? '' : pct>0 ? '▲' : pct<0 ? '▼' : '–'; }
function fmt(v, d=2) {
  if (v===null||v===undefined) return '–';
  return Number(v).toLocaleString('en-US', {minimumFractionDigits:d, maximumFractionDigits:d});
}

function renderIdx(items, id) {
  document.getElementById(id).innerHTML = items.map(s => {
    const c = cls(s.pct), sign = s.pct>=0 ? '+' : '';
    const chgStr = s.pct!==null
      ? `${arrow(s.pct)} ${sign}${fmt(s.change, s.price>999?2:2)} (${sign}${fmt(s.pct)}%)`
      : '–';
    return `<div class="idx-card">
      <div class="idx-name">${s.name}</div>
      <div class="idx-price ${c}">${fmt(s.price, s.price>999?0:2)}</div>
      <div class="idx-chg ${c}">${chgStr}
        <span style="color:#94a3b8;font-size:.75rem;margin-left:.3rem">${s.date||''}</span>
      </div>
    </div>`;
  }).join('');
}

function renderSignalBadges(sig) {
  if (!sig) return '';
  const rc = v => v == null ? 'sig-neutral' : v < 35 ? 'sig-buy' : v > 65 ? 'sig-sell' : 'sig-neutral';
  const bc20 = v => v == null ? 'sig-neutral' : v < -8 ? 'sig-buy' : v > 8 ? 'sig-sell' : 'sig-neutral';
  const bc60 = v => v == null ? 'sig-neutral' : v < -12 ? 'sig-buy' : v > 12 ? 'sig-sell' : 'sig-neutral';
  const fr = v => v == null ? '–' : Math.round(v);
  const fb = v => v == null ? '–' : (v >= 0 ? '+' : '') + v.toFixed(1) + '%';
  return `<div class="sig-bar">
    <div class="sig-row">
      <span class="sig-label">短</span>
      <span class="sig-val ${rc(sig.rsi14)}">RSI ${fr(sig.rsi14)}</span>
      <span class="sig-sep">·</span>
      <span class="sig-val ${bc20(sig.bias20)}">乖 ${fb(sig.bias20)}</span>
    </div>
    <div class="sig-row">
      <span class="sig-label">中</span>
      <span class="sig-val ${rc(sig.rsi21)}">RSI ${fr(sig.rsi21)}</span>
      <span class="sig-sep">·</span>
      <span class="sig-val ${bc60(sig.bias60)}">乖 ${fb(sig.bias60)}</span>
    </div>
  </div>`;
}

function renderStocks(items, id) {
  document.getElementById(id).innerHTML = items.map(s => {
    const c = cls(s.pct), sign = s.pct>=0 ? '+' : '';
    const badge = s.pct!==null
      ? `<span class="chg-badge ${c}">${arrow(s.pct)} ${sign}${fmt(s.change)} (${sign}${fmt(s.pct)}%)</span>`
      : `<span class="chg-badge flat">–</span>`;
    const sigHtml = renderSignalBadges(_signals[s.symbol]);
    const safeName = s.name.replace(/'/g, '&#39;');
    let navHtml = '';
    if (s.nav != null && s.premium != null) {
      const pc = s.premium >= 0 ? 'up' : 'down';
      const pLabel = s.premium >= 0 ? '溢價' : '折價';
      const pSign  = s.premium >= 0 ? '+' : '';
      navHtml = `<div class="nav-bar">淨值 ${fmt(s.nav, 2)} ｜ <span class="nav-prem ${pc}">${pLabel} ${pSign}${fmt(s.premium)}%</span></div>`;
    }
    let instHtml = '';
    const _instCode = s.symbol.replace('.TW', '');
    if (_etfTrading && _etfTrading.tracked && _etfTrading.tracked[_instCode] != null) {
      const td = _etfTrading.tracked[_instCode];
      instHtml = `<div class="inst-bar">${fmtInst3(td)}<span style="color:#cbd5e1;font-size:.6rem;margin-left:auto">(張)</span></div>`;
    } else if (_stockInst && _stockInst.stocks && _stockInst.stocks[_instCode] != null) {
      const td = _stockInst.stocks[_instCode];
      instHtml = `<div class="inst-bar">${fmtInst3(td)}<span style="color:#cbd5e1;font-size:.6rem;margin-left:auto">(張)</span></div>`;
    }
    return `<div class="stock-card">
      <div>
        <div style="display:flex;align-items:center;gap:.4rem">
          <div class="stock-name"${etfTipAttr(s.symbol)}>${s.name}</div>
          <button class="btn-chart-card" onclick="openStockChart('${s.symbol}','${safeName}')" title="K線圖"><i class="bi bi-graph-up"></i></button>
        </div>
        <div class="stock-sub">${s.symbol} · ${s.date||'–'}</div>
      </div>
      <div>
        <div class="stock-price ${c}">${fmt(s.price, s.price>999?0:2)}</div>
        <div style="text-align:right">${badge}</div>
      </div>
      ${sigHtml}${navHtml}${instHtml}
    </div>`;
  }).join('');
}

// ── ETF 持股明細 ─────────────────────────────────────────────────────────────
const ETF_NAMES = {
  '0050':'元大台灣50','006208':'富邦台50','00878':'國泰永續高股息',
  '00919':'群益台灣精選高息','00929':'復華台灣科技優息','00940':'元大台灣價值高息',
};

const ETF_DESC = {
  '0050':   '被動式管理，追蹤台灣50指數（市值前50大）。<br>台積電權重通常逾30%，低費用率（0.43%）。<br>台灣最大規模指數ETF，適合長期核心配置。',
  '006208': '被動式管理，追蹤台灣50指數，標的與0050相同。<br>費用率約0.39%，略低於0050。<br>適合長期核心持有。',
  '00878':  '被動式管理，ESG永續篩選＋高股息因子。<br>季配息，成分股約30支。<br>以傳產、金融高息股為主，剔除爭議產業。',

function renderEtfChanges() {
  const el = document.getElementById('etf-changes-body');
  if (!el) return;
  if (!_etfHoldings || !_etfHoldings.etfs) {
    el.innerHTML = '<div class="etfc-empty">無資料（待 Actions 累積異動紀錄後顯示）</div>';
    return;
  }

  const ETF_SHORT = {
    '0050':'元大50','006208':'富邦台50','00878':'國泰高息',
    '00919':'群益精選','00929':'復華科技','00940':'元大價值',
    '00403A':'統一升級50','00988A':'統一全球創新','00981A':'統一台股增長',
    '00935':'野村新科技','00980A':'野村優選',
  };

  // Aggregate changes across all ETFs
  // Structure: {symbol -> {name, events:[{date, etf, type, pct, from, delta}]}}
  const stockMap = {};

  const addEvent = (sym, name, date, etf, type, pct, from, delta) => {
    if (!stockMap[sym]) stockMap[sym] = { name, events: [] };
    stockMap[sym].events.push({ date, etf, type, pct, from, delta });
  };

  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 90);
  const cutStr = cutoff.toISOString().slice(0, 10);

  Object.entries(_etfHoldings.etfs).forEach(([code, data]) => {
    const etfLabel = ETF_SHORT[code] || code;
    (data.changes || []).forEach(entry => {
      if (!entry.date || entry.date < cutStr) return;
      (entry.in  || []).forEach(h => addEvent(h.symbol, h.name, entry.date, etfLabel, 'in',  h.pct, null,   null));
      (entry.out || []).forEach(h => addEvent(h.symbol, h.name, entry.date, etfLabel, 'out', h.pct, null,   null));
      (entry.up  || []).forEach(h => addEvent(h.symbol, h.name, entry.date, etfLabel, 'up',  h.pct, h.from, h.delta));
      (entry.dn  || []).forEach(h => addEvent(h.symbol, h.name, entry.date, etfLabel, 'dn',  h.pct, h.from, h.delta));
    });
  });

  if (!Object.keys(stockMap).length) {
    el.innerHTML = '<div class="etfc-empty">暫無異動紀錄（資料將於每次 Actions 更新後逐步累積）</div>';
    return;
  }

  // Bucket by type, sort each stock by latest date desc
  const bucket = { in: [], out: [], up: [], dn: [] };
  Object.entries(stockMap).forEach(([sym, d]) => {
    const latest = d.events.reduce((a, b) => a.date > b.date ? a : b);
    const byType = { in: [], out: [], up: [], dn: [] };
    d.events.forEach(e => byType[e.type]?.push(e));
    ['in','out','up','dn'].forEach(t => {
      if (!byType[t].length) return;
      byType[t].sort((a, b) => b.date.localeCompare(a.date));
      bucket[t].push({ sym, name: d.name, events: byType[t], latestDate: byType[t][0].date });
    });
  });
  ['in','out','up','dn'].forEach(t => bucket[t].sort((a, b) => b.latestDate.localeCompare(a.latestDate)));

  const codeTW = s => s.replace(/\.(TW|TWO)$/, '');
  const shortName = n => n.length > 16 ? n.slice(0, 16) + '…' : n;

  const mkTag = (e, t) => {
    if (t === 'in')  return `<span class="etfc-tag etfc-tag-in">${e.etf} +${e.pct?.toFixed(1)}%</span>`;
    if (t === 'out') return `<span class="etfc-tag etfc-tag-out">${e.etf} 退出</span>`;
    if (t === 'up')  return `<span class="etfc-tag etfc-tag-up">${e.etf} +${e.delta?.toFixed(1)}%▲</span>`;
    if (t === 'dn')  return `<span class="etfc-tag etfc-tag-dn">${e.etf} ${e.delta?.toFixed(1)}%▼</span>`;
    return '';
  };

  const mkRows = (list, t) => list.map(s =>
    `<div class="etfc-row">
      <span class="etfc-code">${codeTW(s.sym)}</span>
      <span class="etfc-name">${shortName(s.name)}</span>
      <span class="etfc-tags">${s.events.map(e => mkTag(e, t)).join('')}</span>
      <span class="etfc-date">${s.latestDate.slice(5)}</span>
    </div>`
  ).join('') || '<div class="etfc-none">（近90日無紀錄）</div>';

  const sec = (title, cls, list, t) =>
    `<div class="etfc-section">
      <div class="etfc-sec-hd ${cls}">${title}</div>
      ${mkRows(list, t)}
    </div>`;

  el.innerHTML = `
    <div class="etfc-note">來源：yfinance TOP 10 持股（季度更新）｜近 90 日異動</div>
    <div class="etfc-grid">
      ${sec('▲ 轉進個股（新入 TOP 10）', 'in',  bucket.in,  'in')}
      ${sec('▼ 出脫個股（退出 TOP 10）', 'out', bucket.out, 'out')}
    </div>
    ${(bucket.up.length || bucket.dn.length) ? `<div class="etfc-grid">
      ${sec('↑ 加碼個股（比重大增）', 'up', bucket.up, 'up')}
      ${sec('↓ 減碼個股（比重縮減）', 'dn', bucket.dn, 'dn')}
    </div>` : ''}`;
}

function renderEtfHoldings() {
  const el = document.getElementById('holdings-body');
  if (!el) return;
  if (!_etfHoldings || !_etfHoldings.etfs) {
    el.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:1rem;font-size:.8rem">無持股資料（待首次 Actions 跑完後產生）</div>';
    return;
  }

  const sections = Object.entries(_etfHoldings.etfs).map(([code, data]) => {
    const name     = ETF_NAMES[code] || code;
    const holdings = data.holdings || [];
    const diff     = data.diff || {};
    const inSyms   = new Set((diff.in  || []).map(x => x.symbol));
    const outSyms  = new Set((diff.out || []).map(x => x.symbol));
    const hasChg   = inSyms.size > 0 || outSyms.size > 0;

    const badge = hasChg
      ? `<span class="diff-badge">異動 +${inSyms.size}/-${outSyms.size}</span>`
      : '';
    const changedAt = data.changed_at ? `<span style="font-size:.68rem;font-weight:400;color:#94a3b8;margin-left:.4rem">基準日 ${data.changed_at}</span>` : '';

    const rows = holdings.map(h => {
      const cls = inSyms.has(h.symbol) ? ' class="holding-in"' : '';
      const codeTW = h.symbol.replace(/\.(TW|TWO)$/, '');
      return `<tr${cls}><td>${codeTW}</td><td>${h.name}</td><td class="r">${h.pct.toFixed(2)}%</td></tr>`;
    }).join('');

    const outRows = (diff.out || []).map(h => {
      const codeTW = h.symbol.replace(/\.(TW|TWO)$/, '');
      return `<tr class="holding-out"><td>${codeTW}</td><td>${h.name}</td><td class="r">退場</td></tr>`;
    }).join('');

    return `<div style="margin:.25rem .75rem .6rem">
      <div style="font-size:.82rem;font-weight:700;color:#475569;padding:.3rem 0 .2rem">${name}${badge}${changedAt}</div>
      <table class="holding-table">
        <thead><tr><th>代號</th><th>名稱</th><th class="r">比重</th></tr></thead>
        <tbody>${rows}${outRows}</tbody>
      </table>
    </div>`;
  }).join('<div style="height:.4rem"></div>');

  el.innerHTML = `<div style="font-size:.68rem;color:#94a3b8;text-align:right;padding:.25rem 1rem .1rem">來源：Yahoo Finance top 10（季度更新）</div>${sections}`;
}

function fmtVol(v) {
  if (!v && v !== 0) return '–';
  if (v >= 10000) return (v / 10000).toFixed(1) + '萬張';
  return Math.round(v).toLocaleString() + '張';
}
function fmtAmt(v) {
  if (!v && v !== 0) return '–';
  if (v >= 10000) return (v / 10000).toFixed(2) + '兆元';
  if (v >= 1000)  return Math.round(v) + '億元';
  return v.toFixed(0) + '億元';
}

function biasClass(b) {
  if (b === null || b === undefined) return 'b-0';
  const a = Math.abs(b);
  const dir = b > 0 ? 'pos' : 'neg';
  if (a >= 25) return `b-${dir}-25`;
  if (a >= 20) return `b-${dir}-20`;
  if (a >= 15) return `b-${dir}-15`;
  if (a >= 10) return `b-${dir}-10`;
  return `b-${dir}`;
}

  const bFmt  = v => (v === null || v === undefined) ? '–' : `${sign(v)}${v.toFixed(2)}%`;
  const maFmt = v => v === null ? '–' : fmt(v, v > 999 ? 0 : 2);
  const chartKey = id.replace('an-', '');

  const isTWII = d.symbol === '^TWII';

  // ── 成交量 section ──
  let volTitle, vol3str, maRow, ratioRow;

  if (isTWII) {
    // vol3 / vol_ma* are 億元 from TWSE
    const latestAmt = d.vol3 && d.vol3.length ? d.vol3[d.vol3.length - 1] : null;
    function rStr(ma) {

  const yld = v => v == null ? '' : v > 4  ? 'fund-good' : '';

    P/E &lt;15綠 &gt;50紅 ｜ ROE &gt;20%綠 ｜ 殖利率 &gt;4%綠 ｜ 毛利率 &gt;40%綠 ｜ 營收年增 &gt;20%綠 &lt;0紅
    ｜ 更新：${updated}　｜　來源：yfinance，僅供參考
  </div>`;
}

function fmtEPS(v, prev, decimals) {
  if (v === null || v === undefined) return '<span class="eps-null">—</span>';
  const n = parseFloat(v);
  const d = decimals !== undefined ? decimals : (Math.abs(n) >= 100 ? 1 : 2);
  const str = n.toFixed(d);
  if (prev === null || prev === undefined) return `<span class="eps-val">${str}</span>`;
  const cls = n > parseFloat(prev) ? 'eps-up' : n < parseFloat(prev) ? 'eps-down' : 'eps-val';
  return `<span class="${cls}">${str}</span>`;
}

function renderEPS(items, id, headers) {
  const el = document.getElementById(id);
  if (!items || !items.length) {
    el.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:1rem;font-size:.85rem">暫無資料</div>';
    return;
  }
  const [h22, h23, h24, h25, hPub, hEst] = headers;
  const rows = items.map(s => {
    const d = Math.abs(Math.max(s.y22||0, s.y23||0, s.y24||0, s.y25||0)) >= 100 ? 1 : 2;
    const pubNum = s.pub !== null && s.pub !== undefined;
    const estNum = s.est !== null && s.est !== undefined;
    return `<tr>
      <td>
        <div class="eps-name">${s.name}</div>
        <div class="eps-sym">${s.symbol}${s.fy ? ` · <span class="eps-fy">${s.fy}</span>` : ''}</div>
      </td>
      <td>${fmtEPS(s.y22, null, d)}</td>
      <td>${fmtEPS(s.y23, s.y22, d)}</td>
      <td>${fmtEPS(s.y24, s.y23, d)}</td>
      <td>${fmtEPS(s.y25, s.y24, d)}</td>
      <td>
        ${pubNum ? `<span class="eps-pub">${parseFloat(s.pub).toFixed(d)}</span>` : '<span class="eps-null">—</span>'}
        ${s.pub_note ? `<span class="eps-note">${s.pub_note}</span>` : ''}
      </td>
      <td>
        ${estNum ? `<span class="eps-est">${parseFloat(s.est).toFixed(d)}</span>` : '<span class="eps-null">—</span>'}
        ${s.est_note ? `<span class="eps-note">${s.est_note}</span>` : ''}
      </td>
    </tr>`;
  }).join('');

  el.innerHTML = `<table class="eps-table">
    <thead><tr>
      <th style="text-align:left">公司</th>
      <th>${h22}</th><th>${h23}</th><th>${h24}</th><th>${h25}</th>
      <th>${hPub}</th><th>${hEst}</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="eps-footer">
    <span style="color:#dc2626">▲ 紅色</span>＝年增　<span style="color:#16a34a">▼ 綠色</span>＝年減　｜　單位：各欄幣種　｜　更新：${_epsData ? _epsData.updated : '–'}　｜　部分為估算，請至財報狗/goodinfo/macrotrends核實
  </div>`;
}

    fetch(`data/us.json?t=${ts}`).then(r=>r.json()),
    fetch(`data/tw.json?t=${ts}`).then(r=>r.json()),
    fetch(`data/jp.json?t=${ts}`).then(r=>r.json()),
    fetch(`data/tw_analysis.json?t=${ts}`).then(r=>r.json()).catch(()=>null),
    fetch(`data/tw_futures.json?t=${ts}`).then(r=>r.json()).catch(()=>null),
    fetch(`data/margin.json?t=${ts}`).then(r=>r.json()).catch(()=>null),
    fetch(`data/chart.json?t=${ts}`).then(r=>r.json()).catch(()=>null),
    fetch(`data/signals.json?t=${ts}`).then(r=>r.json()).catch(()=>null),
    fetch(`data/fundamentals.json?t=${ts}`).then(r=>r.json()).catch(()=>null),
    fetch(`data/etf_trading.json?t=${ts}`).then(r=>r.json()).catch(()=>null),
    fetch(`data/etf_holdings.json?t=${ts}`).then(r=>r.json()).catch(()=>null),
    fetch(`data/stock_inst.json?t=${ts}`).then(r=>r.json()).catch(()=>null),
    fetch(`data/margin_rank.json?t=${ts}`).then(r=>r.json()).catch(()=>null),
    fetch(`data/inst_rank.json?t=${ts}`).then(r=>r.json()).catch(()=>null),
  ]);
  _etfTrading  = etfTradingRaw;
  _etfHoldings = etfHoldingsRaw;
  _stockInst   = stockInstRaw;
  _marginData = marginData;
  _chartCache = chartData;
  _signals    = (signalsData && signalsData.stocks) || {};
  _fundData   = (fundRaw && fundRaw.stocks) || {};
  if (fundRaw) _fundData._updated = fundRaw.updated;
  _usData = us;
  _twData = tw;

  renderIdx(us.indices, 'us-indices');
  renderStocks(us.cloud,  'us-cloud');
  renderStocks(us.stocks, 'us-stocks');
  renderAnalysisCard(an ? an.twii    : null, 'an-twii');
  renderAnalysisCard(an ? an.etf0050 : null, 'an-etf0050');
  renderIdx(tw.indices,   'tw-indices');
  renderStocks(tw.stocks, 'tw-stocks');
  renderStocks(tw.drone,  'tw-drone');
  renderStocks(tw.etf,    'tw-etf');
  renderTop3ETF();
  renderMarginRank(marginRankRaw);
  renderInstRank(instRankRaw);
  renderIdx(jp.indices, 'jp-indices');
  renderStocks(jp.stocks, 'jp-stocks');
  switchToLatest(us, tw, jp);
  if (document.getElementById('tw-panel').classList.contains('active') && _marginData && !_marginChart) {
    initMarginChart();
  }

  // 台指夜盤
  const futSec = document.getElementById('tw-futures-section');
  if (fut && fut.futures && fut.futures.some(f => f.price !== null)) {
    const twiiRef = tw.indices ? tw.indices.find(x => x.symbol === '^TWII') : null;
    renderFutures(fut.futures, twiiRef);
    document.getElementById('futures-updated').textContent = fut.updated ? `（${fut.updated}）` : '';
    futSec.style.display = '';
  } else {
    futSec.style.display = 'none';
  }

  // 顯示最晚更新時間
  document.getElementById('last-update').textContent =
    `資料時間｜美股 ${us.updated||'–'} ／ 台股 ${tw.updated||'–'} ／ 日股 ${jp.updated||'–'}`;

  // EPS（只在第一次載入時抓，之後用快取）
  if (!_epsData) {
    try {
      _epsData = await fetch(`data/eps.json?t=${ts}`).then(r => r.json());
    } catch { _epsData = null; }
  }
  if (_epsData) {
    renderEPS(_epsData.us, 'us-eps', ['2022','2023','2024','2025','今年已公布','今年預估 E']);
    renderEPS(_epsData.tw, 'tw-eps', ['2022','2023','2024','2025','今年已公布','今年預估 E']);
    renderEPS(_epsData.jp, 'jp-eps', ['FY22','FY23','FY24','FY25','今年(FY26)','FY27E']);
  }

  initTooltips();
}

// ── GitHub Actions 觸發重抓 ───────────────────────────────────────────────────
const GH_DISPATCH = 'https://api.github.com/repos/raychao0420-lang/iinvestment-tracker/actions/workflows/update.yml/dispatches';
const PAT_KEY = 'gh_pat_inv';
let _fetchTimer = null;
let _longFired = false;
let _longTimer;

async function triggerFetch() {
  if (_fetchTimer) return;

  let token = localStorage.getItem(PAT_KEY);
  if (!token) {
    token = prompt('請輸入 GitHub Fine-grained Token\n（Settings → Developer settings → Fine-grained tokens，需勾選 Actions: Write）：');
    if (!token) return;
    token = token.trim();
    localStorage.setItem(PAT_KEY, token);
  }

  const btn   = document.getElementById('fetch-btn');
  const icon  = document.getElementById('fetch-icon');
  const label = document.getElementById('fetch-label');
  btn.disabled = true;

  try {
    const res = await fetch(GH_DISPATCH, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ ref: 'main' }),
    });

    if (res.status === 204) {
      // Actions 觸發成功，倒數 75 秒後自動刷新
      let secs = 75;
      icon.classList.add('spin');
      label.textContent = `${secs}s`;
      _fetchTimer = setInterval(() => {
        secs--;
        label.textContent = secs > 0 ? `${secs}s` : '讀取中…';
        if (secs <= 0) {
          clearInterval(_fetchTimer); _fetchTimer = null;
          label.textContent = '重抓';
          icon.classList.remove('spin');
          btn.disabled = false;
          manualRefresh();
        }
      }, 1000);
    } else if (res.status === 401 || res.status === 403) {
      localStorage.removeItem(PAT_KEY);
      alert('Token 無效或已過期，已清除，下次重抓時請重新輸入。');
      btn.disabled = false;
    } else {
      const txt = await res.text().catch(() => '');
      alert(`觸發失敗（HTTP ${res.status}）\n${txt.slice(0, 150)}`);
      btn.disabled = false;
    }
  } catch {
    alert('網路錯誤，請確認連線後再試。');
    btn.disabled = false;
  }
}

// 長按 1.5s 清除已儲存的 Token
document.getElementById('fetch-btn').addEventListener('pointerdown', () => {
  _longFired = false;
  _longTimer = setTimeout(() => {
    _longFired = true;
    if (localStorage.getItem(PAT_KEY) && confirm('清除已儲存的 GitHub Token？')) {
      localStorage.removeItem(PAT_KEY);
    }
  }, 1500);
});
['pointerup', 'pointerleave', 'pointercancel'].forEach(ev =>
  document.getElementById('fetch-btn').addEventListener(ev, () => clearTimeout(_longTimer))
);
document.getElementById('fetch-btn').addEventListener('click', () => {
  if (_longFired) { _longFired = false; return; }
  triggerFetch();
});

async function openChart(key) {

  cont.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:3rem;font-size:.9rem">載入中…</div>';

  if (_chartInst) { _chartInst.remove(); _chartInst = null; }

      _chartCache = await fetch(`data/chart.json?t=${Date.now()}`).then(r => r.json());
    } catch {
      cont.innerHTML = '<div style="color:#ef4444;text-align:center;padding:3rem">K線資料載入失敗，請先觸發重抓更新資料</div>';
      return;
    }
  }

  const data = _chartCache[key];
  const names = { twii: '台股大盤 (^TWII)', etf0050: '元大台灣50 (0050)' };
  document.getElementById('chart-title').textContent = names[key] || key;

  if (!data || !data.candles || !data.candles.length) {
    cont.innerHTML = '<div style="color:#ef4444;text-align:center;padding:3rem">暫無資料</div>';
    return;
  }

  cont.innerHTML = '';
  const w = cont.clientWidth, h = cont.clientHeight || window.innerHeight - 56;

  const chart = LightweightCharts.createChart(cont, {
    width: w, height: h,
    layout:    { background: { color: '#0f172a' }, textColor: '#94a3b8' },
    grid:      { vertLines: { color: '#1e293b' }, horzLines: { color: '#1e293b' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#334155' },
    timeScale: { borderColor: '#334155', timeVisible: false },
  });
  _chartInst = chart;

  // Volume bars (bottom 22%)
  const volS = chart.addHistogramSeries({
    color: 'rgba(100,116,139,0.4)',
    priceFormat: { type: 'volume' },
    priceScaleId: 'vol',
  });
  chart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.78, bottom: 0 } });
  volS.setData(data.volume || []);

  // MA lines
  const mkLine = (color, title) => chart.addLineSeries({
    color, lineWidth: 1, title,
    lastValueVisible: false, priceLineVisible: false,
    crosshairMarkerVisible: false,
  });
  mkLine('#f59e0b', 'MA5').setData(data.ma5  || []);
  mkLine('#60a5fa', 'MA20').setData(data.ma20 || []);
  mkLine('#c084fc', 'MA60').setData(data.ma60 || []);

  // Candlestick (紅漲綠跌)
  const candS = chart.addCandlestickSeries({
    upColor: '#dc2626', downColor: '#16a34a',
    borderUpColor: '#dc2626', borderDownColor: '#16a34a',
    wickUpColor:   '#ef4444', wickDownColor:   '#22c55e',
  });
  candS.setData(data.candles);

  // Build volume lookup for tooltip
  const volMap = {};
  (data.volume || []).forEach(v => { volMap[v.time] = v.value; });

  const fv = v => v >= 1000 ? Math.round(v).toLocaleString() : v.toFixed(2);
  function showBarInfo(bar, dStr) {
    const chg  = bar.close - bar.open;
    const pct  = chg / bar.open * 100;
    const sign = chg >= 0 ? '+' : '';
    const col  = chg >= 0 ? '#ef4444' : '#22c55e';
    const vv   = volMap[dStr];
    const vStr = vv != null ? ` ｜ 量 ${data.vol_unit === '億元' ? Math.round(vv)+'億' : vv >= 10000 ? (vv/10000).toFixed(1)+'萬張' : Math.round(vv).toLocaleString()+'張'}` : '';
    document.getElementById('chart-ohlc').innerHTML =
      `<span style="color:#cbd5e1">${dStr}</span> ` +
      `開 <b>${fv(bar.open)}</b> 高 <b>${fv(bar.high)}</b> 低 <b>${fv(bar.low)}</b> 收 <b>${fv(bar.close)}</b> ` +
      `<span style="color:${col}">${sign}${fv(chg)} (${sign}${pct.toFixed(2)}%)</span>${vStr}`;
  }

  // 預設顯示最後一根（今日收盤）
  const lastBar = data.candles[data.candles.length - 1];
  showBarInfo(lastBar, lastBar.time);

  chart.subscribeCrosshairMove(param => {
    if (!param.time) { showBarInfo(lastBar, lastBar.time); return; }
    const bar = param.seriesData.get(candS);
    if (!bar) return;
    const dStr = typeof param.time === 'string'
      ? param.time
      : `${param.time.year}-${String(param.time.month).padStart(2,'0')}-${String(param.time.day).padStart(2,'0')}`;
    showBarInfo(bar, dStr);
  });

  // Responsive resize
  const ro = new ResizeObserver(() => {
    if (_chartInst) _chartInst.applyOptions({ width: cont.clientWidth, height: cont.clientHeight });
  });
  ro.observe(cont);
  _chartInst._ro = ro;

  chart.timeScale().fitContent();
}

function closeChart() {
  document.getElementById('chart-modal').style.display = 'none';
  document.getElementById('stock-margin-section').style.display = 'none';
  if (_chartInst) {
    if (_chartInst._ro) _chartInst._ro.disconnect();
    _chartInst.remove();
    _chartInst = null;
  }
  if (_stockChart2) { _stockChart2.remove(); _stockChart2 = null; }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeChart(); });

// ── 個股 K 線圖 + 融資餘額 ────────────────────────────────────────────────────
async function openStockChart(symbol, name) {
  const modal = document.getElementById('chart-modal');
  modal.style.display = 'flex';
  document.getElementById('chart-title').textContent = name;
  document.getElementById('chart-ohlc').textContent = '';
  document.getElementById('stock-margin-section').style.display = 'none';

  const cont = document.getElementById('chart-container');
  cont.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:3rem;font-size:.9rem">載入中…</div>';
  if (_chartInst) { if (_chartInst._ro) _chartInst._ro.disconnect(); _chartInst.remove(); _chartInst = null; }
  if (_stockChart2) { _stockChart2.remove(); _stockChart2 = null; }

  if (!_stockCharts) {
    try {
      _stockCharts = await fetch(`data/stock_charts.json?t=${Date.now()}`).then(r => r.json());
    } catch {
      cont.innerHTML = '<div style="color:#ef4444;text-align:center;padding:3rem">K線資料載入失敗，請觸發重抓</div>';
      return;
    }
  }

  const data = _stockCharts.stocks && _stockCharts.stocks[symbol];
  if (!data || !data.candles || !data.candles.length) {
    cont.innerHTML = '<div style="color:#ef4444;text-align:center;padding:3rem">暫無資料，請觸發重抓</div>';
    return;
  }

  cont.innerHTML = '';
  const w = cont.clientWidth;
  const h = cont.clientHeight || window.innerHeight - 80;

  const chart = LightweightCharts.createChart(cont, {
    width: w, height: h,
    layout:    { background: { color: '#0f172a' }, textColor: '#94a3b8' },
    grid:      { vertLines: { color: '#1e293b' }, horzLines: { color: '#1e293b' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#334155' },
    timeScale: { borderColor: '#334155', timeVisible: false },
  });
  _chartInst = chart;

  const volS = chart.addHistogramSeries({
    color: 'rgba(100,116,139,0.4)', priceFormat: { type: 'volume' }, priceScaleId: 'vol',
  });
  chart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.78, bottom: 0 } });
  volS.setData(data.volume || []);

  const mkLine = (color, title) => chart.addLineSeries({
    color, lineWidth: 1, title,
    lastValueVisible: false, priceLineVisible: false, crosshairMarkerVisible: false,
  });
  mkLine('#f59e0b', 'MA5').setData(data.ma5  || []);
  mkLine('#60a5fa', 'MA20').setData(data.ma20 || []);
  mkLine('#c084fc', 'MA60').setData(data.ma60 || []);

  const candS = chart.addCandlestickSeries({
    upColor: '#dc2626', downColor: '#16a34a',
    borderUpColor: '#dc2626', borderDownColor: '#16a34a',
    wickUpColor:   '#ef4444', wickDownColor:   '#22c55e',
  });
  candS.setData(data.candles);

  const volMap = {};
  (data.volume || []).forEach(v => { volMap[v.time] = v.value; });
  const fv = v => v >= 1000 ? Math.round(v).toLocaleString() : v.toFixed(2);
  const lastBar = data.candles[data.candles.length - 1];

  function showBarInfo(bar, dStr) {
    const chg = bar.close - bar.open, pct = chg / bar.open * 100;
    const sign = chg >= 0 ? '+' : '', col = chg >= 0 ? '#ef4444' : '#22c55e';
    const vv = volMap[dStr];
    const vStr = vv != null
      ? ` 量${data.vol_unit === '張' ? Math.round(vv).toLocaleString()+'張' : Math.round(vv).toLocaleString()}`
      : '';
    document.getElementById('chart-ohlc').innerHTML =
      `<span style="color:#cbd5e1">${dStr.slice(5).replace('-','/')}</span> ` +
      `開<b>${fv(bar.open)}</b> 高<b>${fv(bar.high)}</b> 低<b>${fv(bar.low)}</b> 收<b>${fv(bar.close)}</b> ` +
      `<span style="color:${col}">${sign}${fv(chg)}(${sign}${pct.toFixed(1)}%)</span>${vStr}`;
  }
  showBarInfo(lastBar, lastBar.time);

  chart.subscribeCrosshairMove(param => {
    if (!param.time) { showBarInfo(lastBar, lastBar.time); return; }
    const bar = param.seriesData.get(candS);
    if (!bar) return;
    const dStr = typeof param.time === 'string' ? param.time
      : `${param.time.year}-${String(param.time.month).padStart(2,'0')}-${String(param.time.day).padStart(2,'0')}`;
    showBarInfo(bar, dStr);
  });

  const ro = new ResizeObserver(() => {
    if (_chartInst) _chartInst.applyOptions({ width: cont.clientWidth, height: cont.clientHeight });
  });
  ro.observe(cont);
  _chartInst._ro = ro;
  chart.timeScale().fitContent();

  // 台股才顯示融資餘額
  if (!symbol.endsWith('.TW')) return;

  if (!_stockMargin) {
    try {
      _stockMargin = await fetch(`data/stock_margin.json?t=${Date.now()}`).then(r => r.json());
    } catch { _stockMargin = {}; }
  }

  const code   = symbol.replace('.TW', '');
  const mData  = _stockMargin.stocks && _stockMargin.stocks[code];
  if (!mData || !mData.series || !mData.series.length) return;

  const ms = document.getElementById('stock-margin-section');
  ms.style.display = 'flex';
  renderStockMarginChart(mData.series);
}

function renderStockMarginChart(series) {
  if (_stockChart2) { _stockChart2.remove(); _stockChart2 = null; }
  const cont = document.getElementById('stock-margin-chart');
  if (!cont || cont.clientWidth === 0) return;

  const latest = series[series.length - 1];
  const prev   = series.length >= 2 ? series[series.length - 2] : null;
  const diff   = prev ? latest.value - prev.value : 0;
  const sign   = diff >= 0 ? '+' : '';
  const col    = diff > 0 ? '#ef4444' : diff < 0 ? '#22c55e' : '#94a3b8';
  document.getElementById('stock-margin-info').innerHTML =
    `${latest.value.toLocaleString()} 張 ` +
    `<span style="color:${col}">${sign}${diff.toLocaleString()}</span> ` +
    `<span style="color:#64748b">${latest.time.slice(5).replace('-','/')}</span>`;

  const chart = LightweightCharts.createChart(cont, {
    width:  cont.clientWidth, height: 130,
    layout:    { background: { color: '#0f172a' }, textColor: '#94a3b8' },
    grid:      { vertLines: { color: '#1e293b' }, horzLines: { color: '#1e293b' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#334155' },
    timeScale: { borderColor: '#334155', timeVisible: false, fixLeftEdge: true, fixRightEdge: true },
    handleScroll: { mouseWheel: false, pressedMouseMove: true },
    handleScale:  { mouseWheel: false, pinch: false },
  });
  _stockChart2 = chart;

  // MA10
  if (series.length >= 10) {
    const ma10 = [];
    for (let i = 9; i < series.length; i++) {
      const avg = series.slice(i - 9, i + 1).reduce((s, v) => s + v.value, 0) / 10;
      ma10.push({ time: series[i].time, value: Math.round(avg) });
    }
    chart.addLineSeries({ color:'#60a5fa', lineWidth:1, title:'MA10',
      priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false,
    }).setData(ma10);
  }

  const lineSeries = chart.addLineSeries({
    color: '#f59e0b', lineWidth: 2,
    priceFormat: { type: 'price', precision: 0, minMove: 1 },
    priceLineVisible: false, lastValueVisible: true,
  });
  lineSeries.setData(series);

  chart.subscribeCrosshairMove(param => {
    if (!param.time || !param.seriesData.get(lineSeries)) {
      document.getElementById('stock-margin-info').innerHTML =
        `${latest.value.toLocaleString()} 張 <span style="color:${col}">${sign}${diff.toLocaleString()}</span> ` +
        `<span style="color:#64748b">${latest.time.slice(5).replace('-','/')}</span>`;
      return;
    }
    const v = param.seriesData.get(lineSeries).value;
    const t = typeof param.time === 'string' ? param.time
      : `${param.time.year}-${String(param.time.month).padStart(2,'0')}-${String(param.time.day).padStart(2,'0')}`;
    document.getElementById('stock-margin-info').innerHTML =
      `${v.toLocaleString()} 張 <span style="color:#64748b">${t.slice(5).replace('-','/')}</span>`;
  });

  new ResizeObserver(() => {
    if (_stockChart2) _stockChart2.applyOptions({ width: cont.clientWidth });
  }).observe(cont);

  chart.timeScale().fitContent();
}

// ── 融資餘額 + 大盤K線 ───────────────────────────────────────────────────────
function initMarginChart() {
  if (_marginChart) return;
  const series = (_marginData && _marginData.series) || [];
  if (!series.length) {
    document.getElementById('margin-latest').textContent = '暫無資料';
    return;
  }

  // Info bar
  const latest = series[series.length - 1];
  const prev20 = series.length >= 20 ? series[series.length - 20] : null;
  document.getElementById('margin-updated').textContent = _marginData.updated ? `（${_marginData.updated}）` : '';
  document.getElementById('margin-latest').textContent =
    `${latest.value.toLocaleString('en-US', {minimumFractionDigits:1, maximumFractionDigits:1})} 億元  ${latest.time.slice(5).replace('-','/')}`;
  if (prev20) {
    const diff = Math.round(latest.value - prev20.value);
    const sign = diff >= 0 ? '+' : '';
    const col  = diff >= 0 ? '#ef4444' : '#22c55e';
    document.getElementById('margin-change').innerHTML =
      `月比 <span style="color:${col}">${sign}${diff.toLocaleString()} 億</span>`;
  }

  const marginCont = document.getElementById('margin-chart');
  if (!marginCont || marginCont.clientWidth === 0) return;
  const w = marginCont.clientWidth;

  // ── TWII K線圖 ──
  const klineCont = document.getElementById('twii-kline-chart');
  const twiiData  = _chartCache && _chartCache.twii;

  if (klineCont && twiiData && twiiData.candles && twiiData.candles.length) {
    const kChart = LightweightCharts.createChart(klineCont, {
      width:  w,
      height: 180,
      layout:    { background: { color: '#1e293b' }, textColor: '#94a3b8' },
      grid:      { vertLines: { color: '#334155' }, horzLines: { color: '#334155' } },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#334155' },
      timeScale: { borderColor: '#334155', timeVisible: false },
      handleScroll: { mouseWheel: false, pressedMouseMove: true },
      handleScale:  { mouseWheel: false, pinch: false },
    });
    _klineChart = kChart;

    const volS = kChart.addHistogramSeries({
      color: 'rgba(100,116,139,0.4)', priceFormat: { type: 'volume' }, priceScaleId: 'vol',
    });
    kChart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.78, bottom: 0 } });
    volS.setData(twiiData.volume || []);

    const mkLine = (color, title) => kChart.addLineSeries({
      color, lineWidth: 1, title,
      lastValueVisible: false, priceLineVisible: false, crosshairMarkerVisible: false,
    });
    mkLine('#f59e0b', 'MA5').setData(twiiData.ma5  || []);
    mkLine('#60a5fa', 'MA20').setData(twiiData.ma20 || []);
    mkLine('#c084fc', 'MA60').setData(twiiData.ma60 || []);

    const candS = kChart.addCandlestickSeries({
      upColor: '#dc2626', downColor: '#16a34a',
      borderUpColor: '#dc2626', borderDownColor: '#16a34a',
      wickUpColor:   '#ef4444', wickDownColor:   '#22c55e',
    });
    candS.setData(twiiData.candles);

    const volMap = {};
    (twiiData.volume || []).forEach(v => { volMap[v.time] = v.value; });

    const fv = v => v >= 1000 ? Math.round(v).toLocaleString() : v.toFixed(2);
    const lastBar = twiiData.candles[twiiData.candles.length - 1];

    function showKlineInfo(bar, dStr) {
      const chg  = bar.close - bar.open;
      const pct  = chg / bar.open * 100;
      const sign = chg >= 0 ? '+' : '';
      const col  = chg >= 0 ? '#ef4444' : '#22c55e';
      const vv   = volMap[dStr];
      const vStr = vv != null ? ` 量${Math.round(vv)}億` : '';
      document.getElementById('kline-ohlc').innerHTML =
        `${dStr.slice(5).replace('-','/')} ` +
        `開<b>${fv(bar.open)}</b> 高<b>${fv(bar.high)}</b> 低<b>${fv(bar.low)}</b> 收<b>${fv(bar.close)}</b> ` +
        `<span style="color:${col}">${sign}${fv(chg)}(${sign}${pct.toFixed(1)}%)</span>${vStr}`;
    }
    showKlineInfo(lastBar, lastBar.time);

    kChart.subscribeCrosshairMove(param => {
      if (!param.time) { showKlineInfo(lastBar, lastBar.time); return; }
      const bar = param.seriesData.get(candS);
      if (!bar) return;
      const dStr = typeof param.time === 'string' ? param.time
        : `${param.time.year}-${String(param.time.month).padStart(2,'0')}-${String(param.time.day).padStart(2,'0')}`;
      showKlineInfo(bar, dStr);
    });

    // 初始顯示融資餘額的時間範圍
    try {
      kChart.timeScale().setVisibleRange({ from: series[0].time, to: series[series.length - 1].time });
    } catch(e) {
      kChart.timeScale().fitContent();
    }

    new ResizeObserver(() => {
      if (_klineChart) _klineChart.applyOptions({ width: klineCont.clientWidth });
    }).observe(klineCont);

  } else if (klineCont) {
    klineCont.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:1.5rem;font-size:.8rem">K線資料未載入，請觸發重抓</div>';
  }

  // ── 融資餘額線圖 ──
  const chart = LightweightCharts.createChart(marginCont, {
    width:  w,
    height: 130,
    layout:    { background: { color: '#1e293b' }, textColor: '#94a3b8' },
    grid:      { vertLines: { color: '#334155' }, horzLines: { color: '#334155' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#334155' },
    timeScale: { borderColor: '#334155', timeVisible: false, fixLeftEdge: true, fixRightEdge: true },
    handleScroll: { mouseWheel: false, pressedMouseMove: true },
    handleScale:  { mouseWheel: false, pinch: false },
  });
  _marginChart = chart;

  if (series.length >= 20) {
    const ma20data = [];
    for (let i = 19; i < series.length; i++) {
      const avg = series.slice(i - 19, i + 1).reduce((s, v) => s + v.value, 0) / 20;
      ma20data.push({ time: series[i].time, value: Math.round(avg * 10) / 10 });
    }
    chart.addLineSeries({
      color: '#60a5fa', lineWidth: 1, title: 'MA20',
      priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
    }).setData(ma20data);
  }

  const lineSeries = chart.addLineSeries({
    color: '#f59e0b', lineWidth: 2,
    priceFormat: { type: 'price', precision: 1, minMove: 0.1 },
    priceLineVisible: false, lastValueVisible: true,
  });
  lineSeries.setData(series);

  chart.subscribeCrosshairMove(param => {
    if (!param.time || !param.seriesData.get(lineSeries)) {
      document.getElementById('margin-latest').textContent =
        `${latest.value.toLocaleString('en-US', {minimumFractionDigits:1, maximumFractionDigits:1})} 億元  ${latest.time.slice(5).replace('-','/')}`;
      return;
    }
    const v = param.seriesData.get(lineSeries).value;
    const t = typeof param.time === 'string' ? param.time
      : `${param.time.year}-${String(param.time.month).padStart(2,'0')}-${String(param.time.day).padStart(2,'0')}`;
    document.getElementById('margin-latest').textContent =
      `${v.toLocaleString('en-US', {minimumFractionDigits:1, maximumFractionDigits:1})} 億元  ${t.slice(5).replace('-','/')}`;
  });

  new ResizeObserver(() => {
    if (_marginChart) _marginChart.applyOptions({ width: marginCont.clientWidth });
  }).observe(marginCont);

  chart.timeScale().fitContent();
}

document.getElementById('tw-tab').addEventListener('shown.bs.tab', () => {
  if (_marginData && !_marginChart) initMarginChart();
});

// ── 初始化 ────────────────────────────────────────────────────────────────────
updateClock();
updateTags();
initTab();
setInterval(() => { updateClock(); updateTags(); }, 30000);
loadAll().catch(() => {
  document.getElementById('last-update').textContent = '資料載入失敗，請稍後再試';
});
</script>
