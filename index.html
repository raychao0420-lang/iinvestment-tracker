<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>投資小幫手</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  :root { --up:#dc2626; --down:#16a34a; --flat:#6b7280; }

  body { background:#f1f5f9; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }

  .top-bar {
    background:linear-gradient(135deg,#1e293b 0%,#334155 100%);
    color:#fff; padding:.6rem 1rem;
    position:sticky; top:0; z-index:99;
    display:flex; align-items:center; justify-content:space-between;
  }
  .top-bar h1 { font-size:1.15rem; font-weight:700; margin:0; }
  .top-bar .time-badge {
    font-size:.75rem; background:rgba(255,255,255,.15);
    border-radius:99px; padding:.2rem .65rem; white-space:nowrap;
  }

  .market-tabs { background:#fff; border-bottom:1px solid #e2e8f0; }
  .market-tabs .nav-link {
    font-size:1.75rem; font-weight:700; padding:1rem 1.8rem;
    border-radius:0; border-bottom:4px solid transparent; color:#475569;
  }
  .market-tabs .nav-link.active { color:#1d4ed8; border-bottom-color:#1d4ed8; background:none; }
  .badge-dot { display:inline-block; width:11px; height:11px; border-radius:50%; margin-right:7px; vertical-align:middle; }
  .dot-us{background:#f59e0b;} .dot-tw{background:#10b981;} .dot-jp{background:#f43f5e;}

  .section-title {
    font-size:.95rem; font-weight:700; letter-spacing:.06em;
    text-transform:uppercase; color:#94a3b8; padding:.7rem 1rem .4rem;
  }

  /* 股票卡片 */
  .stock-card {
    background:#fff; border-radius:12px; padding:.85rem 1rem;
    margin:.4rem .75rem; box-shadow:0 1px 3px rgba(0,0,0,.07);
    display:flex; align-items:center; justify-content:space-between;
    flex-wrap:wrap;
  }
  .stock-name  { font-size:1.6rem; font-weight:600; color:#1e293b; }
  .stock-sub   { font-size:1.1rem; color:#94a3b8; margin-top:4px; }
  .stock-price { font-size:2rem; font-weight:700; text-align:right; }
  .chg-badge {
    display:inline-block; font-size:1.25rem; font-weight:700;
    padding:.32rem .85rem; border-radius:6px; margin-top:6px;
  }
  .chg-badge.up   { background:#fee2e2; color:var(--up); }
  .chg-badge.down { background:#dcfce7; color:var(--down); }
  .chg-badge.flat { background:#f1f5f9; color:var(--flat); }

  /* 買賣訊號 */
  .sig-bar {
    width:100%; border-top:1px solid #f1f5f9;
    padding-top:.3rem; margin-top:.25rem;
    display:flex; flex-direction:column; gap:.18rem;
  }
  .sig-row { display:flex; align-items:center; gap:.35rem; font-size:.68rem; }
  .sig-label { color:#94a3b8; font-weight:700; font-size:.6rem; min-width:1.4rem; }
  .sig-sep   { color:#e2e8f0; }
  .sig-val   { font-family:'Courier New',monospace; font-weight:600; }
  .sig-buy   { color:#16a34a; }
  .sig-sell  { color:#dc2626; }
  .sig-neutral { color:#94a3b8; font-weight:400; }

  /* ETF 持股明細 */
  .holding-table { width:100%; border-collapse:collapse; font-size:.72rem; }
  .holding-table th { color:#94a3b8; font-weight:600; font-size:.65rem; padding:.25rem .4rem; text-align:left; border-bottom:1px solid #e2e8f0; }
  .holding-table th.r { text-align:right; }
  .holding-table td { padding:.25rem .4rem; border-top:1px solid #f8fafc; }
  .holding-table td.r { text-align:right; font-family:'Courier New',monospace; }
  .holding-in  { background:#dcfce7; }
  .holding-out { background:#fee2e2; opacity:.7; text-decoration:line-through; }
  .diff-badge { font-size:.6rem; font-weight:700; background:#fef3c7; color:#b45309; padding:.1rem .4rem; border-radius:99px; margin-left:.35rem; }

  /* ETF 三大法人 */
  .inst-bar {
    width:100%; border-top:1px solid #f1f5f9;
    padding-top:.28rem; margin-top:.22rem;
    font-size:.68rem; display:flex; align-items:center; gap:.4rem; flex-wrap:wrap;
  }
  .inst-lbl { color:#94a3b8; font-size:.6rem; }
  .inst-sep { color:#e2e8f0; }
  .inst-up  { color:var(--up);   font-weight:700; font-family:'Courier New',monospace; }
  .inst-dn  { color:var(--down); font-weight:700; font-family:'Courier New',monospace; }
  .inst-flat{ color:#94a3b8;     font-family:'Courier New',monospace; }

  /* ETF 淨值溢折價 */
  .nav-bar {
    width:100%; border-top:1px solid #f1f5f9;
    padding-top:.28rem; margin-top:.22rem;
    font-size:.72rem; color:#94a3b8; display:flex; align-items:center; gap:.4rem;
  }
  .nav-prem { font-weight:700; }

  /* 指數大卡 */
  .idx-card {
    background:#fff; border-radius:12px; padding:1rem 1.1rem;
    margin:.4rem .75rem; box-shadow:0 1px 3px rgba(0,0,0,.07);
  }
  .idx-name  { font-size:1.3rem; color:#64748b; font-weight:600; }
  .idx-price { font-size:2.6rem; font-weight:800; margin:.25rem 0; }
  .idx-chg   { font-size:1.35rem; font-weight:600; }

  .up{color:var(--up);} .down{color:var(--down);} .flat{color:var(--flat);}

  /* 電腦版 */
  @media(min-width:768px){
    .idx-grid   { display:grid; grid-template-columns:repeat(2,1fr); }
    .stock-grid { display:grid; grid-template-columns:repeat(2,1fr); }
    .idx-card,.stock-card { margin:.4rem; }
    .stock-name  { font-size:1rem; }
    .stock-price { font-size:1.25rem; }
  }
  @media(min-width:1200px){
    .idx-grid   { grid-template-columns:repeat(4,1fr); }
    .stock-grid { grid-template-columns:repeat(3,1fr); }
  }

  /* 底部 */
  .update-bar {
    background:#fff; border-top:1px solid #e2e8f0; text-align:center;
    padding:.6rem; font-size:.8rem; color:#94a3b8; position:sticky; bottom:0;
  }

  /* 更新時段標籤 */
  .session-tag { font-size:.7rem; font-weight:700; padding:.15rem .5rem; border-radius:99px; margin-left:.4rem; vertical-align:middle; }
  .tag-live  { background:#dcfce7; color:#16a34a; }
  .tag-wait  { background:#fef3c7; color:#b45309; }

  /* 骨架 */
  .skeleton { background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);
    background-size:200% 100%; animation:shimmer 1.5s infinite;
    border-radius:6px; height:1.2em; width:70%; }
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  .spin{display:inline-block;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── 大盤技術分析 ─────────────────────────────────── */
  .an-card {
    background:#fff; border-radius:12px; padding:1rem;
    margin:.4rem .75rem; box-shadow:0 1px 3px rgba(0,0,0,.07);
  }
  .an-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:.7rem; }
  .an-name { font-size:1.1rem; font-weight:700; color:#1e293b; }
  .an-sub  { font-size:.75rem; color:#94a3b8; }
  .an-price{ font-size:1.8rem; font-weight:800; }

  .an-bias { width:100%; border-collapse:collapse; font-size:.82rem; margin-bottom:.65rem; }
  .an-bias th { color:#94a3b8; font-weight:600; padding:.2rem .3rem; text-align:center; font-size:.75rem; }
  .an-bias td { padding:.22rem .3rem; text-align:center; }
  .an-bias .row-lbl { text-align:left; font-weight:600; color:#475569; white-space:nowrap; }
  .an-bias .ma-val  { color:#64748b; font-size:.8rem; }

  /* 乖離率色階：正乖離紅，負乖離綠 */
  .b-0      { color:#475569; }
  .b-pos    { color:var(--up); }
  .b-neg    { color:var(--down); }
  .b-pos-10 { background:#fee2e2; color:var(--up);   font-weight:700; border-radius:4px; padding:.1rem .3rem; display:inline-block; }
  .b-neg-10 { background:#dcfce7; color:var(--down); font-weight:700; border-radius:4px; padding:.1rem .3rem; display:inline-block; }
  .b-pos-15 { background:#fecaca; color:#b91c1c;     font-weight:700; border-radius:4px; padding:.1rem .3rem; display:inline-block; }
  .b-neg-15 { background:#bbf7d0; color:#15803d;     font-weight:700; border-radius:4px; padding:.1rem .3rem; display:inline-block; }
  .b-pos-20 { background:#fca5a5; color:#991b1b;     font-weight:700; border-radius:4px; padding:.1rem .3rem; display:inline-block; }
  .b-neg-20 { background:#86efac; color:#14532d;     font-weight:700; border-radius:4px; padding:.1rem .3rem; display:inline-block; }
  .b-pos-25 { background:#ef4444; color:#fff;        font-weight:700; border-radius:4px; padding:.1rem .3rem; display:inline-block; }
  .b-neg-25 { background:#22c55e; color:#fff;        font-weight:700; border-radius:4px; padding:.1rem .3rem; display:inline-block; }

  .an-vol { font-size:.8rem; color:#475569; border-top:1px solid #f1f5f9; padding-top:.5rem; }
  .an-vol-title { font-weight:700; color:#64748b; margin-bottom:.25rem; }
  .vol-hi { color:#dc2626; font-weight:600; }
  .vol-lo { color:#16a34a; font-weight:600; }

  @media(min-width:768px){
    .an-grid { display:grid; grid-template-columns:repeat(2,1fr); }
    .an-card { margin:.4rem; }
  }

  /* ── K 線圖 Modal ─────────────────────────────────── */
  #chart-modal {
    display:none; position:fixed; inset:0; z-index:9999;
    background:#0f172a; flex-direction:column;
  }
  #chart-header {
    display:flex; align-items:center; gap:.5rem;
    padding:.55rem .85rem; border-bottom:1px solid #1e293b; flex-shrink:0;
    flex-wrap:wrap;
  }
  #chart-title { color:#f1f5f9; font-size:.95rem; font-weight:700; white-space:nowrap; }
  #chart-ohlc  { flex:1; font-size:.72rem; color:#94a3b8; font-family:'Courier New',monospace;
    min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #chart-close { margin-left:auto; background:none; border:none; color:#64748b;
    font-size:1.5rem; line-height:1; cursor:pointer; padding:0 .2rem; flex-shrink:0; }
  #chart-close:hover { color:#94a3b8; }
  #chart-container { flex:1; min-height:0; width:100%; }

  .btn-chart {
    background:#1e293b; border:1px solid #334155; border-radius:5px;
    color:#94a3b8; font-size:.68rem; padding:.1rem .45rem; cursor:pointer; white-space:nowrap;
  }
  .btn-chart:hover { background:#334155; color:#e2e8f0; }
  .btn-chart-card {
    background:#f1f5f9; border:1px solid #e2e8f0; border-radius:4px;
    color:#64748b; font-size:.65rem; padding:.1rem .35rem; cursor:pointer; flex-shrink:0;
  }
  .btn-chart-card:hover { background:#e2e8f0; color:#475569; }

  /* ── 個股 Modal 融資餘額區 ── */
  #stock-margin-section {
    flex-shrink:0; flex-direction:column; background:#0f172a;
    border-top:1px solid #1e293b;
  }
  #stock-margin-header {
    display:flex; justify-content:space-between; align-items:center;
    padding:.3rem .75rem; font-size:.72rem; color:#94a3b8;
  }
  #stock-margin-chart { height:130px; width:100%; }

  /* ── 台指夜盤 ────────────────────────────────────────── */
  .futures-updated { font-size:.7rem; color:#94a3b8; font-weight:400; margin-left:.5rem; }

  /* ── 財報 EPS ─────────────────────────────────────────── */
  .eps-toggle-btn {
    background:none; border:none; cursor:pointer;
    font-size:.95rem; font-weight:700; letter-spacing:.06em;
    text-transform:uppercase; color:#94a3b8; padding:.7rem 1rem .4rem;
    display:flex; align-items:center; gap:.4rem; width:100%;
  }
  .eps-toggle-btn:hover { color:#64748b; }
  .eps-toggle-icon { transition:transform .2s; font-size:.85rem; }
  .eps-toggle-icon.open { transform:rotate(90deg); }
  .eps-body { display:none; }
  .eps-body.open { display:block; }
  .eps-table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; margin:.3rem .75rem 0; }
  .eps-table { width:100%; border-collapse:collapse; font-size:.82rem; }
  .eps-table th {
    background:#f8fafc; color:#64748b; font-weight:700;
    padding:.45rem .55rem; text-align:right; white-space:nowrap;
    border-bottom:2px solid #e2e8f0; font-size:.72rem; position:sticky; top:0;
  }
  .eps-table th:first-child { text-align:left; min-width:90px; }
  .eps-table td { padding:.38rem .55rem; text-align:right; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
  .eps-table td:first-child { text-align:left; }
  .eps-table tr:hover { background:#f8fafc; }
  .eps-name { font-weight:600; color:#1e293b; font-size:.88rem; line-height:1.2; }
  .eps-sym  { color:#94a3b8; font-size:.7rem; }
  .eps-fy   { color:#cbd5e1; font-size:.65rem; }
  .eps-val  { color:#475569; }
  .eps-up   { color:#dc2626; font-weight:600; }
  .eps-down { color:#16a34a; font-weight:600; }
  .eps-pub  { background:#eff6ff; color:#1d4ed8; font-weight:700; border-radius:3px; padding:.05rem .3rem; display:inline-block; }
  .eps-est  { color:#7c3aed; font-style:italic; }
  .eps-note { font-size:.65rem; color:#94a3b8; display:block; margin-top:1px; white-space:nowrap; }
  .eps-null { color:#cbd5e1; }
  .eps-footer { font-size:.68rem; color:#94a3b8; text-align:right; padding:.3rem 1rem .5rem; }

  /* 基本面估值表 */
  .fund-good { color:#16a34a; font-weight:600; }
  .fund-warn { color:#dc2626; font-weight:600; }
  .fund-null { color:#cbd5e1; }
  .fund-group { background:#f8fafc; color:#64748b; font-weight:700; font-size:.72rem; padding:.3rem .55rem; }
</style>
</head>
<body>

<div class="top-bar">
  <h1><i class="bi bi-bar-chart-fill me-2" style="color:#60a5fa"></i>投資小幫手</h1>
  <div style="display:flex;align-items:center;gap:.5rem">
    <button id="fetch-btn" title="觸發 GitHub Actions 重新抓取（長按清除 Token）" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:99px;padding:.2rem .75rem;font-size:.8rem;cursor:pointer;display:flex;align-items:center;gap:.3rem">
      <i class="bi bi-cloud-download" id="fetch-icon"></i><span id="fetch-label">重抓</span>
    </button>
    <button id="refresh-btn" onclick="manualRefresh()" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:99px;padding:.2rem .75rem;font-size:.8rem;cursor:pointer;display:flex;align-items:center;gap:.3rem">
      <i class="bi bi-arrow-clockwise" id="refresh-icon"></i>更新
    </button>
    <span class="time-badge" id="clock">--:--</span>
  </div>
</div>

<ul class="nav market-tabs px-1" id="marketTabs" role="tablist">
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="us-tab" data-bs-toggle="tab" data-bs-target="#us-panel" type="button" role="tab">
      <span class="badge-dot dot-us"></span>美股<span class="session-tag" id="us-tag"></span>
    </button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="tw-tab" data-bs-toggle="tab" data-bs-target="#tw-panel" type="button" role="tab">
      <span class="badge-dot dot-tw"></span>台股<span class="session-tag" id="tw-tag"></span>
    </button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="jp-tab" data-bs-toggle="tab" data-bs-target="#jp-panel" type="button" role="tab">
      <span class="badge-dot dot-jp"></span>日股 <span class="session-tag" id="jp-tag"></span>
    </button>
  </li>
</ul>

<div class="tab-content pb-5">
  <div class="tab-pane fade" id="us-panel" role="tabpanel">
    <div class="section-title">指數</div>
    <div class="idx-grid"  id="us-indices"><div class="idx-card"><div class="skeleton"></div></div></div>
    <div class="section-title mt-1">雲端服務</div>
    <div class="stock-grid" id="us-cloud"><div class="stock-card"><div class="skeleton"></div></div></div>
    <div class="section-title mt-1">台灣相關 & ETF</div>
    <div class="stock-grid" id="us-stocks"><div class="stock-card"><div class="skeleton"></div></div></div>
    <button class="eps-toggle-btn" onclick="toggleFund('us')">
      <i class="bi bi-bar-chart-steps"></i>基本面估值
      <i class="bi bi-chevron-right eps-toggle-icon" id="fund-icon-us"></i>
    </button>
    <div class="eps-body" id="fund-body-us">
      <div class="eps-table-wrap"><div id="us-fund"><div class="skeleton" style="height:8rem;margin:.5rem"></div></div></div>
    </div>
    <button class="eps-toggle-btn" onclick="toggleEPS('us')">
      <i class="bi bi-journal-text"></i>財報 EPS
      <i class="bi bi-chevron-right eps-toggle-icon" id="eps-icon-us"></i>
    </button>
    <div class="eps-body" id="eps-body-us">
      <div class="eps-table-wrap"><div id="us-eps"><div class="skeleton" style="height:8rem;margin:.5rem"></div></div></div>
    </div>
  </div>
  <div class="tab-pane fade" id="tw-panel" role="tabpanel">
    <div id="tw-futures-section" style="display:none">
      <div class="section-title">台指夜盤<span class="futures-updated" id="futures-updated"></span></div>
      <div class="idx-grid" id="tw-futures-list"></div>
    </div>
    <div class="section-title">大盤技術分析</div>
    <div class="an-grid">
      <div id="an-twii"><div class="an-card"><div class="skeleton" style="height:10rem"></div></div></div>
      <div id="an-etf0050"><div class="an-card"><div class="skeleton" style="height:10rem"></div></div></div>
    </div>
    <div class="section-title mt-1">融資餘額 vs 大盤<span id="margin-updated" style="font-size:.7rem;color:#94a3b8;font-weight:400;margin-left:.4rem"></span></div>
    <div style="margin:.2rem .75rem .5rem;background:#1e293b;border-radius:10px;overflow:hidden">
      <div style="padding:.35rem .75rem .15rem;font-size:.72rem;color:#94a3b8;display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:600;color:#cbd5e1">台股大盤 K線 (^TWII)</span>
        <span id="kline-ohlc" style="font-family:'Courier New',monospace;font-size:.68rem;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:.5rem"></span>
      </div>
      <div id="twii-kline-chart" style="height:180px"></div>
      <div style="padding:.35rem .75rem .15rem;font-size:.72rem;color:#94a3b8;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #334155">
        <span id="margin-latest">載入中…</span><span id="margin-change"></span>
      </div>
      <div id="margin-chart" style="height:130px"></div>
    </div>
    <div class="section-title mt-1">指數</div>
    <div class="idx-grid"  id="tw-indices"><div class="idx-card"><div class="skeleton"></div></div></div>
    <div class="section-title mt-1">個股</div>
    <div class="stock-grid" id="tw-stocks"><div class="stock-card"><div class="skeleton"></div></div></div>
    <div class="section-title mt-1">無人機概念</div>
    <div class="stock-grid" id="tw-drone"><div class="stock-card"><div class="skeleton"></div></div></div>
    <div class="section-title mt-1">ETF</div>
    <div class="stock-grid" id="tw-etf"><div class="stock-card"><div class="skeleton"></div></div></div>
    <div class="section-title mt-1" id="etf-top3-title" style="display:none">今日成交量前三名</div>
    <div class="stock-grid" id="etf-top3"></div>
    <button class="eps-toggle-btn" onclick="toggleHoldings()">
      <i class="bi bi-pie-chart"></i>ETF 持股 TOP 10
      <i class="bi bi-chevron-right eps-toggle-icon" id="holdings-icon"></i>
    </button>
    <div class="eps-body" id="holdings-body" style="display:none"></div>
    <button class="eps-toggle-btn" onclick="toggleFund('tw')">
      <i class="bi bi-bar-chart-steps"></i>基本面估值
      <i class="bi bi-chevron-right eps-toggle-icon" id="fund-icon-tw"></i>
    </button>
    <div class="eps-body" id="fund-body-tw">
      <div class="eps-table-wrap"><div id="tw-fund"><div class="skeleton" style="height:8rem;margin:.5rem"></div></div></div>
    </div>
    <button class="eps-toggle-btn" onclick="toggleEPS('tw')">
      <i class="bi bi-journal-text"></i>財報 EPS
      <i class="bi bi-chevron-right eps-toggle-icon" id="eps-icon-tw"></i>
    </button>
    <div class="eps-body" id="eps-body-tw">
      <div class="eps-table-wrap"><div id="tw-eps"><div class="skeleton" style="height:8rem;margin:.5rem"></div></div></div>
    </div>
  </div>
  <div class="tab-pane fade" id="jp-panel" role="tabpanel">
    <div class="section-title">指數</div>
    <div class="idx-grid"  id="jp-indices"><div class="idx-card"><div class="skeleton"></div></div></div>
    <div class="section-title mt-1">半導體相關</div>
    <div class="stock-grid" id="jp-stocks"><div class="stock-card"><div class="skeleton"></div></div></div>
    <button class="eps-toggle-btn" onclick="toggleEPS('jp')">
      <i class="bi bi-journal-text"></i>財報 EPS
      <i class="bi bi-chevron-right eps-toggle-icon" id="eps-icon-jp"></i>
    </button>
    <div class="eps-body" id="eps-body-jp">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- K 線圖 Modal -->
<div id="chart-modal">
  <div id="chart-header">
    <span id="chart-title">K 線圖</span>
    <span id="chart-ohlc"></span>
    <button id="chart-close" onclick="closeChart()">×</button>
  </div>
  <div id="chart-container"></div>
  <div id="stock-margin-section" style="display:none">
    <div id="stock-margin-header">
      <span>融資餘額（張）</span>
      <span id="stock-margin-info" style="font-family:'Courier New',monospace"></span>
    </div>
    <div id="stock-margin-chart"></div>
  </div>
</div>
<script>
// ── 時鐘 / Tab ────────────────────────────────────────────────────────────────
function twNow() {
  return new Date(new Date().toLocaleString('en-US', {timeZone:'Asia/Taipei'}));
}
function updateClock() {
  const d = twNow(), p = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent =
    `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function updateTags() {
  const m = twNow().getHours()*60 + twNow().getMinutes();
  const set = (id, text, cls) => {
    const el = document.getElementById(id);
    el.textContent = text; el.className = 'session-tag ' + (cls||'');
  };
  set('us-tag', m>=6*60&&m<14*60 ? '已更新' : '', m>=6*60&&m<14*60 ? 'tag-wait' : '');
  set('tw-tag', m>=9*60&&m<13*60+30 ? '盤中' : m>=13*60+30&&m<17*60 ? '已收盤' : '',
      m>=9*60&&m<13*60+30 ? 'tag-live' : 'tag-wait');
  set('jp-tag', m>=8*60&&m<14*60+30 ? '盤中' : m>=14*60+30&&m<17*60 ? '已收盤' : '',
      m>=8*60&&m<14*60+30 ? 'tag-live' : 'tag-wait');
}
function initTab() {
  // 預設美股
  bootstrap.Tab.getOrCreateInstance(document.getElementById('us-tab')).show();
}
function switchToLatest(us, tw, jp) {
  // 資料載入後切換到最近更新的市場
  const parse = s => s ? new Date(s.replace(/\//g,'-').replace(' ','T')) : new Date(0);
  const latest = [
    { id:'us-tab', t: parse(us.updated) },
    { id:'tw-tab', t: parse(tw.updated) },
    { id:'jp-tab', t: parse(jp.updated) },
  ].sort((a,b) => b.t - a.t)[0];
  bootstrap.Tab.getOrCreateInstance(document.getElementById(latest.id)).show();
}

// ── 渲染 ─────────────────────────────────────────────────────────────────────
function cls(pct) { return pct===null ? 'flat' : pct>0 ? 'up' : pct<0 ? 'down' : 'flat'; }
function arrow(pct) { return pct===null ? '' : pct>0 ? '▲' : pct<0 ? '▼' : '–'; }
function fmt(v, d=2) {
  if (v===null||v===undefined) return '–';
  return Number(v).toLocaleString('en-US', {minimumFractionDigits:d, maximumFractionDigits:d});
}

function renderIdx(items, id) {
  document.getElementById(id).innerHTML = items.map(s => {
    const c = cls(s.pct), sign = s.pct>=0 ? '+' : '';
    const chgStr = s.pct!==null
      ? `${arrow(s.pct)} ${sign}${fmt(s.change, s.price>999?2:2)} (${sign}${fmt(s.pct)}%)`
      : '–';
    return `<div class="idx-card">
      <div class="idx-name">${s.name}</div>
      <div class="idx-price ${c}">${fmt(s.price, s.price>999?0:2)}</div>
      <div class="idx-chg ${c}">${chgStr}
        <span style="color:#94a3b8;font-size:.75rem;margin-left:.3rem">${s.date||''}</span>
      </div>
    </div>`;
  }).join('');
}

function renderSignalBadges(sig) {
  if (!sig) return '';
  const rc = v => v == null ? 'sig-neutral' : v < 35 ? 'sig-buy' : v > 65 ? 'sig-sell' : 'sig-neutral';
  const bc20 = v => v == null ? 'sig-neutral' : v < -8 ? 'sig-buy' : v > 8 ? 'sig-sell' : 'sig-neutral';
  const bc60 = v => v == null ? 'sig-neutral' : v < -12 ? 'sig-buy' : v > 12 ? 'sig-sell' : 'sig-neutral';
  const fr = v => v == null ? '–' : Math.round(v);
  const fb = v => v == null ? '–' : (v >= 0 ? '+' : '') + v.toFixed(1) + '%';
  return `<div class="sig-bar">
    <div class="sig-row">
      <span class="sig-label">短</span>
      <span class="sig-val ${rc(sig.rsi14)}">RSI ${fr(sig.rsi14)}</span>
      <span class="sig-sep">·</span>
      <span class="sig-val ${bc20(sig.bias20)}">乖 ${fb(sig.bias20)}</span>
    </div>
    <div class="sig-row">
      <span class="sig-label">中</span>
      <span class="sig-val ${rc(sig.rsi21)}">RSI ${fr(sig.rsi21)}</span>
      <span class="sig-sep">·</span>
      <span class="sig-val ${bc60(sig.bias60)}">乖 ${fb(sig.bias60)}</span>
    </div>
  </div>`;
}

function renderStocks(items, id) {
  document.getElementById(id).innerHTML = items.map(s => {
    const c = cls(s.pct), sign = s.pct>=0 ? '+' : '';
    const badge = s.pct!==null
      ? `<span class="chg-badge ${c}">${arrow(s.pct)} ${sign}${fmt(s.change)} (${sign}${fmt(s.pct)}%)</span>`
      : `<span class="chg-badge flat">–</span>`;
    const sigHtml = renderSignalBadges(_signals[s.symbol]);
    const safeName = s.name.replace(/'/g, '&#39;');
    let navHtml = '';
    if (s.nav != null && s.premium != null) {
      const pc = s.premium >= 0 ? 'up' : 'down';
      const pLabel = s.premium >= 0 ? '溢價' : '折價';
      const pSign  = s.premium >= 0 ? '+' : '';
      navHtml = `<div class="nav-bar">淨值 ${fmt(s.nav, 2)} ｜ <span class="nav-prem ${pc}">${pLabel} ${pSign}${fmt(s.premium)}%</span></div>`;
    }
    let instHtml = '';
    const _instCode = s.symbol.replace('.TW', '');
    if (_etfTrading && _etfTrading.tracked && _etfTrading.tracked[_instCode] != null) {
      const td = _etfTrading.tracked[_instCode];
      instHtml = `<div class="inst-bar">${fmtInst3(td)}<span style="color:#cbd5e1;font-size:.6rem;margin-left:auto">(張)</span></div>`;
    } else if (_stockInst && _stockInst.stocks && _stockInst.stocks[_instCode] != null) {
      const td = _stockInst.stocks[_instCode];
      instHtml = `<div class="inst-bar">${fmtInst3(td)}<span style="color:#cbd5e1;font-size:.6rem;margin-left:auto">(張)</span></div>`;
    }
    return `<div class="stock-card">
      <div>
        <div style="display:flex;align-items:center;gap:.4rem">
          <div class="stock-name">${s.name}</div>
          <button class="btn-chart-card" onclick="openStockChart('${s.symbol}','${safeName}')" title="K線圖"><i class="bi bi-graph-up"></i></button>
        </div>
        <div class="stock-sub">${s.symbol} · ${s.date||'–'}</div>
      </div>
      <div>
        <div class="stock-price ${c}">${fmt(s.price, s.price>999?0:2)}</div>
        <div style="text-align:right">${badge}</div>
      </div>
      ${sigHtml}${navHtml}${instHtml}
    </div>`;
  }).join('');
}

// ── ETF 持股明細 ─────────────────────────────────────────────────────────────
const ETF_NAMES = {
  '0050':'元大台灣50','006208':'富邦台50','00878':'國泰永續高股息',
  '00919':'群益台灣精選高息','00929':'復華台灣科技優息','00940':'元大台灣價值高息',
};

function toggleHoldings() {
  const body = document.getElementById('holdings-body');
  const icon = document.getElementById('holdings-icon');
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : '';
  icon.style.transform = open ? '' : 'rotate(90deg)';
  if (!open) renderEtfHoldings();
}

function renderEtfHoldings() {
  const el = document.getElementById('holdings-body');
  if (!el) return;
  if (!_etfHoldings || !_etfHoldings.etfs) {
    el.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:1rem;font-size:.8rem">無持股資料（待首次 Actions 跑完後產生）</div>';
    return;
  }

  const sections = Object.entries(_etfHoldings.etfs).map(([code, data]) => {
    const name     = ETF_NAMES[code] || code;
    const holdings = data.holdings || [];
    const diff     = data.diff || {};
    const inSyms   = new Set((diff.in  || []).map(x => x.symbol));
    const outSyms  = new Set((diff.out || []).map(x => x.symbol));
    const hasChg   = inSyms.size > 0 || outSyms.size > 0;

    const badge = hasChg
      ? `<span class="diff-badge">異動 +${inSyms.size}/-${outSyms.size}</span>`
      : '';
    const changedAt = data.changed_at ? `<span style="font-size:.68rem;font-weight:400;color:#94a3b8;margin-left:.4rem">基準日 ${data.changed_at}</span>` : '';

    const rows = holdings.map(h => {
      const cls = inSyms.has(h.symbol) ? ' class="holding-in"' : '';
      const codeTW = h.symbol.replace(/\.(TW|TWO)$/, '');
      return `<tr${cls}><td>${codeTW}</td><td>${h.name}</td><td class="r">${h.pct.toFixed(2)}%</td></tr>`;
    }).join('');

    const outRows = (diff.out || []).map(h => {
      const codeTW = h.symbol.replace(/\.(TW|TWO)$/, '');
      return `<tr class="holding-out"><td>${codeTW}</td><td>${h.name}</td><td class="r">退場</td></tr>`;
    }).join('');

    return `<div style="margin:.25rem .75rem .6rem">
      <div style="font-size:.82rem;font-weight:700;color:#475569;padding:.3rem 0 .2rem">${name}${badge}${changedAt}</div>
      <table class="holding-table">
        <thead><tr><th>代號</th><th>名稱</th><th class="r">比重</th></tr></thead>
        <tbody>${rows}${outRows}</tbody>
      </table>
    </div>`;
  }).join('<div style="height:.4rem"></div>');

  el.innerHTML = `<div style="font-size:.68rem;color:#94a3b8;text-align:right;padding:.25rem 1rem .1rem">來源：Yahoo Finance top 10（季度更新）</div>${sections}`;
}

// ── ETF 三大法人 ─────────────────────────────────────────────────────────────
function fmtInstVal(v) {
  if (v == null) return '<span class="inst-flat">–</span>';
  const t = Math.round(v / 1000);
  if (t === 0) return '<span class="inst-flat">0</span>';
  return t > 0
    ? `<span class="inst-up">+${t.toLocaleString()}</span>`
    : `<span class="inst-dn">${t.toLocaleString()}</span>`;
}
function fmtInst3(td) {
  return `<span class="inst-lbl">外資</span>${fmtInstVal(td.fi)}`
       + `<span class="inst-sep">｜</span>`
       + `<span class="inst-lbl">投信</span>${fmtInstVal(td.sit)}`
       + `<span class="inst-sep">｜</span>`
       + `<span class="inst-lbl">自營</span>${fmtInstVal(td.dealer)}`;
}
function renderTop3ETF() {
  const titleEl = document.getElementById('etf-top3-title');
  const el      = document.getElementById('etf-top3');
  if (!el) return;
  if (!_etfTrading || !_etfTrading.top3 || !_etfTrading.top3.length) {
    if (titleEl) titleEl.style.display = 'none';
    el.innerHTML = '';
    return;
  }
  if (titleEl) titleEl.style.display = '';
  const fmtVols = v => Math.round(v / 1000).toLocaleString() + '張';
  el.innerHTML = _etfTrading.top3.map((e, i) => `
    <div class="stock-card">
      <div style="width:100%">
        <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.2rem">
          <span style="font-size:.65rem;font-weight:700;background:#e2e8f0;color:#64748b;padding:.1rem .45rem;border-radius:99px">#${i+1}</span>
          <span class="stock-name">${e.name}</span>
          <span class="stock-sub" style="margin:0">${e.code}</span>
        </div>
        <div class="stock-sub">成交量 ${fmtVols(e.volume || 0)}</div>
      </div>
      <div class="inst-bar" style="border-top:none;padding-top:.1rem;margin-top:.1rem">
        ${fmtInst3(e)}<span style="color:#cbd5e1;font-size:.6rem;margin-left:auto">(張)</span>
      </div>
    </div>`).join('');
}

// ── 大盤技術分析 ─────────────────────────────────────────────────────────────
function fmtVol(v) {
  if (!v && v !== 0) return '–';
  if (v >= 10000) return (v / 10000).toFixed(1) + '萬張';
  return Math.round(v).toLocaleString() + '張';
}
function fmtAmt(v) {
  if (!v && v !== 0) return '–';
  if (v >= 10000) return (v / 10000).toFixed(2) + '兆元';
  if (v >= 1000)  return Math.round(v) + '億元';
  return v.toFixed(0) + '億元';
}

function biasClass(b) {
  if (b === null || b === undefined) return 'b-0';
  const a = Math.abs(b);
  const dir = b > 0 ? 'pos' : 'neg';
  if (a >= 25) return `b-${dir}-25`;
  if (a >= 20) return `b-${dir}-20`;
  if (a >= 15) return `b-${dir}-15`;
  if (a >= 10) return `b-${dir}-10`;
  return `b-${dir}`;
}

function renderAnalysisCard(d, id) {
  const el = document.getElementById(id);
  if (!d || !d.price) {
    el.innerHTML = '<div class="an-card" style="color:#94a3b8;text-align:center;padding:1.5rem;font-size:.85rem">暫無資料</div>';
    return;
  }
  const sign  = v => (v !== null && v >= 0) ? '+' : '';
  const bFmt  = v => (v === null || v === undefined) ? '–' : `${sign(v)}${v.toFixed(2)}%`;
  const maFmt = v => v === null ? '–' : fmt(v, v > 999 ? 0 : 2);
  const chartKey = id.replace('an-', '');

  const isTWII = d.symbol === '^TWII';

  // ── 成交量 section ──
  let volTitle, vol3str, maRow, ratioRow;

  if (isTWII) {
    // vol3 / vol_ma* are 億元 from TWSE
    const latestAmt = d.vol3 && d.vol3.length ? d.vol3[d.vol3.length - 1] : null;
    function rStr(ma) {
      if (!latestAmt || !ma) return '<span style="color:#94a3b8">–</span>';
      const r = (latestAmt / ma - 1) * 100;
      return `<span class="${r > 0 ? 'vol-hi' : 'vol-lo'}">${r >= 0 ? '+' : ''}${r.toFixed(1)}%</span>`;
    }
    volTitle = '成交金額（近三日 → 最新）';
    vol3str  = d.vol3 && d.vol3.length ? d.vol3.map(fmtAmt).join(' → ') : '–';
    maRow    = `5均 ${fmtAmt(d.vol_ma5)} ｜ 20均 ${fmtAmt(d.vol_ma20)} ｜ 半均 ${fmtAmt(d.vol_ma120)}`;
    ratioRow = `今量比較：vs 5均 ${rStr(d.vol_ma5)} ｜ vs 20均 ${rStr(d.vol_ma20)} ｜ vs 半均 ${rStr(d.vol_ma120)}`;

  } else {
    // 0050: vol3 = 張, vol3_amt = 億元; use 億元 for ratio
    const latestAmt = d.vol3_amt && d.vol3_amt.length ? d.vol3_amt[d.vol3_amt.length - 1] : null;
    function rStr(ma) {
      if (!latestAmt || !ma) return '<span style="color:#94a3b8">–</span>';
      const r = (latestAmt / ma - 1) * 100;
      return `<span class="${r > 0 ? 'vol-hi' : 'vol-lo'}">${r >= 0 ? '+' : ''}${r.toFixed(1)}%</span>`;
    }
    const zip = (z, a) => z && a ? `${fmtVol(z)}<small style="color:#94a3b8;margin-left:.2rem">(${fmtAmt(a)})</small>` : fmtVol(z||0);
    volTitle = '成交量（近三日 → 最新）';
    vol3str  = (d.vol3||[]).map((z,i) => zip(z, d.vol3_amt && d.vol3_amt[i])).join(' → ') || '–';
    maRow    = `5均 ${zip(d.vol_ma5, d.vol_ma5_amt)} ｜ 20均 ${zip(d.vol_ma20, d.vol_ma20_amt)} ｜ 半均 ${zip(d.vol_ma120, d.vol_ma120_amt)}`;
    ratioRow = `今量比較：vs 5均 ${rStr(d.vol_ma5_amt)} ｜ vs 20均 ${rStr(d.vol_ma20_amt)} ｜ vs 半均 ${rStr(d.vol_ma120_amt)}`;
  }

  el.innerHTML = `<div class="an-card">
    <div class="an-header">
      <div>
        <div style="display:flex;align-items:center;gap:.5rem">
          <div class="an-name">${d.name}</div>
          <button class="btn-chart" onclick="openChart('${chartKey}')"><i class="bi bi-bar-chart-line"></i> K線圖</button>
        </div>
        <div class="an-sub">${d.symbol} · ${d.date || '–'}</div>
      </div>
      <div style="text-align:right">
        <div class="an-price ${cls(d.pct)}">${fmt(d.price, d.price > 999 ? 0 : 2)}</div>
        <div class="idx-chg ${cls(d.pct)}" style="font-size:1rem">${d.pct !== null && d.pct !== undefined
          ? arrow(d.pct) + ' ' + (d.pct >= 0 ? '+' : '') + fmt(d.change, 2) + ' (' + (d.pct >= 0 ? '+' : '') + fmt(d.pct) + '%)'
          : '–'}</div>
      </div>
    </div>
    <table class="an-bias">
      <thead>
        <tr><th></th><th>週線<br>MA5</th><th>月線<br>MA20</th><th>半年線<br>MA120</th></tr>
      </thead>
      <tbody>
        <tr>
          <td class="row-lbl">均線</td>
          <td class="ma-val">${maFmt(d.ma5)}</td>
          <td class="ma-val">${maFmt(d.ma20)}</td>
          <td class="ma-val">${maFmt(d.ma120)}</td>
        </tr>
        <tr>
          <td class="row-lbl">乖離</td>
          <td><span class="${biasClass(d.bias5)}">${bFmt(d.bias5)}</span></td>
          <td><span class="${biasClass(d.bias20)}">${bFmt(d.bias20)}</span></td>
          <td><span class="${biasClass(d.bias120)}">${bFmt(d.bias120)}</span></td>
        </tr>
      </tbody>
    </table>
    <div class="an-vol">
      <div class="an-vol-title">${volTitle}</div>
      <div style="margin-bottom:.2rem">${vol3str}</div>
      <div style="margin-bottom:.15rem;color:#64748b">${maRow}</div>
      <div>${ratioRow}</div>
    </div>
  </div>`;
}

// ── 台指夜盤 ─────────────────────────────────────────────────────────────────
function renderFutures(items, twiiRef) {
  const el = document.getElementById('tw-futures-list');
  // append 收盤指數 from existing tw data
  const all = twiiRef
    ? [...items, { symbol: '^TWII', name: '收盤指數', price: twiiRef.price,
                   change: twiiRef.change, pct: twiiRef.pct, contract: twiiRef.date || '' }]
    : items;
  el.innerHTML = all.map(s => {
    const c = cls(s.pct), sign = s.pct !== null && s.pct >= 0 ? '+' : '';
    const chgStr = s.pct !== null
      ? `${arrow(s.pct)} ${sign}${fmt(s.change, 0)} (${sign}${fmt(s.pct)}%)`
      : '–';
    const sub = s.contract
      ? `<span style="color:#94a3b8;font-size:.72rem;margin-left:.25rem">${String(s.contract).slice(-4)}</span>`
      : '';
    return `<div class="idx-card">
      <div class="idx-name">${s.name}${sub}</div>
      <div class="idx-price ${c}">${fmt(s.price, s.price > 999 ? 0 : 2)}</div>
      <div class="idx-chg ${c}">${chgStr}</div>
    </div>`;
  }).join('');
}

// ── 財報 EPS ─────────────────────────────────────────────────────────────────
let _epsData = null;

function toggleEPS(market) {
  const body = document.getElementById(`eps-body-${market}`);
  const icon = document.getElementById(`eps-icon-${market}`);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  icon.classList.toggle('open', !isOpen);
}

function toggleFund(market) {
  const body = document.getElementById(`fund-body-${market}`);
  const icon = document.getElementById(`fund-icon-${market}`);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  icon.classList.toggle('open', !isOpen);
  if (!isOpen) renderFundamentals(market);
}

function renderFundamentals(market) {
  const el = document.getElementById(`${market}-fund`);
  if (!el) return;

  const src  = market === 'us' ? _usData : _twData;
  const updated = _fundData._updated || '–';

  if (!src || !Object.keys(_fundData).length) {
    el.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:1rem;font-size:.85rem">暫無資料，請觸發重抓</div>';
    return;
  }

  const groups = market === 'us'
    ? [{ label:'個股 & ETF', items: src.stocks || [] }, { label:'雲端服務', items: src.cloud || [] }]
    : [{ label:'個股', items: src.stocks || [] }, { label:'無人機概念', items: src.drone || [] }, { label:'ETF', items: src.etf || [] }];

  const fv  = v => v != null ? v.toFixed(1) : '<span class="fund-null">—</span>';
  const fp  = v => v != null ? v.toFixed(1) + '%' : '<span class="fund-null">—</span>';
  const pe  = v => v == null ? '' : v < 15 ? 'fund-good' : v > 50 ? 'fund-warn' : '';
  const roe = v => v == null ? '' : v > 20 ? 'fund-good' : '';
  const yld = v => v == null ? '' : v > 4  ? 'fund-good' : '';
  const gm  = v => v == null ? '' : v > 40 ? 'fund-good' : '';
  const rev = v => v == null ? '' : v > 20 ? 'fund-good' : v < 0 ? 'fund-warn' : '';

  let rows = '';
  for (const { label, items } of groups) {
    if (!items.length) continue;
    rows += `<tr><td colspan="8" class="fund-group">${label}</td></tr>`;
    for (const s of items) {
      const d = _fundData[s.symbol] || {};
      rows += `<tr>
        <td><div class="eps-name">${s.name}</div><div class="eps-sym">${s.symbol}</div></td>
        <td class="${pe(d.pe)}">${fv(d.pe)}</td>
        <td class="${pe(d.fpe)}">${fv(d.fpe)}</td>
        <td>${fv(d.pb)}</td>
        <td class="${roe(d.roe)}">${fp(d.roe)}</td>
        <td class="${yld(d.div_yield)}">${d.div_yield != null ? d.div_yield.toFixed(2)+'%' : '<span class="fund-null">—</span>'}</td>
        <td class="${gm(d.gm)}">${fp(d.gm)}</td>
        <td class="${rev(d.rev_growth)}">${fp(d.rev_growth)}</td>
      </tr>`;
    }
  }

  el.innerHTML = `<table class="eps-table">
    <thead><tr>
      <th style="text-align:left">公司</th>
      <th>P/E</th><th>遠P/E</th><th>P/B</th>
      <th>ROE</th><th>殖利率</th><th>毛利率</th><th>營收年增</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="eps-footer">
    <span style="color:#16a34a">■ 綠</span>＝優　<span style="color:#dc2626">■ 紅</span>＝偏貴/負成長　｜
    P/E &lt;15綠 &gt;50紅 ｜ ROE &gt;20%綠 ｜ 殖利率 &gt;4%綠 ｜ 毛利率 &gt;40%綠 ｜ 營收年增 &gt;20%綠 &lt;0紅
    ｜ 更新：${updated}　｜　來源：yfinance，僅供參考
  </div>`;
}

function fmtEPS(v, prev, decimals) {
  if (v === null || v === undefined) return '<span class="eps-null">—</span>';
  const n = parseFloat(v);
  const d = decimals !== undefined ? decimals : (Math.abs(n) >= 100 ? 1 : 2);
  const str = n.toFixed(d);
  if (prev === null || prev === undefined) return `<span class="eps-val">${str}</span>`;
  const cls = n > parseFloat(prev) ? 'eps-up' : n < parseFloat(prev) ? 'eps-down' : 'eps-val';
  return `<span class="${cls}">${str}</span>`;
}

function renderEPS(items, id, headers) {
  const el = document.getElementById(id);
  if (!items || !items.length) {
    el.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:1rem;font-size:.85rem">暫無資料</div>';
    return;
  }
  const [h22, h23, h24, h25, hPub, hEst] = headers;
  const rows = items.map(s => {
    const d = Math.abs(Math.max(s.y22||0, s.y23||0, s.y24||0, s.y25||0)) >= 100 ? 1 : 2;
    const pubNum = s.pub !== null && s.pub !== undefined;
    const estNum = s.est !== null && s.est !== undefined;
    return `<tr>
      <td>
        <div class="eps-name">${s.name}</div>
        <div class="eps-sym">${s.symbol}${s.fy ? ` · <span class="eps-fy">${s.fy}</span>` : ''}</div>
      </td>
      <td>${fmtEPS(s.y22, null, d)}</td>
      <td>${fmtEPS(s.y23, s.y22, d)}</td>
      <td>${fmtEPS(s.y24, s.y23, d)}</td>
      <td>${fmtEPS(s.y25, s.y24, d)}</td>
      <td>
        ${pubNum ? `<span class="eps-pub">${parseFloat(s.pub).toFixed(d)}</span>` : '<span class="eps-null">—</span>'}
        ${s.pub_note ? `<span class="eps-note">${s.pub_note}</span>` : ''}
      </td>
      <td>
        ${estNum ? `<span class="eps-est">${parseFloat(s.est).toFixed(d)}</span>` : '<span class="eps-null">—</span>'}
        ${s.est_note ? `<span class="eps-note">${s.est_note}</span>` : ''}
      </td>
    </tr>`;
  }).join('');

  el.innerHTML = `<table class="eps-table">
    <thead><tr>
      <th style="text-align:left">公司</th>
      <th>${h22}</th><th>${h23}</th><th>${h24}</th><th>${h25}</th>
      <th>${hPub}</th><th>${hEst}</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="eps-footer">
    <span style="color:#dc2626">▲ 紅色</span>＝年增　<span style="color:#16a34a">▼ 綠色</span>＝年減　｜　單位：各欄幣種　｜　更新：${_epsData ? _epsData.updated : '–'}　｜　部分為估算，請至財報狗/goodinfo/macrotrends核實
  </div>`;
}

    fetch(`data/tw_analysis.json?t=${ts}`).then(r=>r.json()).catch(()=>null),
    fetch(`data/tw_futures.json?t=${ts}`).then(r=>r.json()).catch(()=>null),
    fetch(`data/margin.json?t=${ts}`).then(r=>r.json()).catch(()=>null),
    fetch(`data/chart.json?t=${ts}`).then(r=>r.json()).catch(()=>null),
    fetch(`data/signals.json?t=${ts}`).then(r=>r.json()).catch(()=>null),
    fetch(`data/fundamentals.json?t=${ts}`).then(r=>r.json()).catch(()=>null),
    fetch(`data/etf_trading.json?t=${ts}`).then(r=>r.json()).catch(()=>null),
    fetch(`data/etf_holdings.json?t=${ts}`).then(r=>r.json()).catch(()=>null),
    fetch(`data/stock_inst.json?t=${ts}`).then(r=>r.json()).catch(()=>null),
  ]);
  _etfTrading  = etfTradingRaw;
  _etfHoldings = etfHoldingsRaw;
  _stockInst   = stockInstRaw;
  _marginData = marginData;
  _chartCache = chartData;
  _signals    = (signalsData && signalsData.stocks) || {};
  _fundData   = (fundRaw && fundRaw.stocks) || {};
  if (fundRaw) _fundData._updated = fundRaw.updated;
  _usData = us;
  _twData = tw;

  renderIdx(us.indices, 'us-indices');

  renderAnalysisCard(an ? an.twii    : null, 'an-twii');

  // 台指夜盤

    const twiiRef = tw.indices ? tw.indices.find(x => x.symbol === '^TWII') : null;

  document.getElementById('last-update').textContent =
    `資料時間｜美股 ${us.updated||'–'} ／ 台股 ${tw.updated||'–'} ／ 日股 ${jp.updated||'–'}`;

  if (!_epsData) {
    try {
      _epsData = await fetch(`data/eps.json?t=${ts}`).then(r => r.json());

  if (_epsData) {
    renderEPS(_epsData.us, 'us-eps', ['2022','2023','2024','2025','今年已公布','今年預估 E']);
    renderEPS(_epsData.tw, 'tw-eps', ['2022','2023','2024','2025','今年已公布','今年預估 E']);

}

// ── GitHub Actions 觸發重抓 ───────────────────────────────────────────────────
const GH_DISPATCH = 'https://api.github.com/repos/raychao0420-lang/iinvestment-tracker/actions/workflows/update.yml/dispatches';
const PAT_KEY = 'gh_pat_inv';
let _fetchTimer = null;
let _longFired = false;
let _longTimer;

async function triggerFetch() {
  if (_fetchTimer) return;

  let token = localStorage.getItem(PAT_KEY);
  if (!token) {
    token = prompt('請輸入 GitHub Fine-grained Token\n（Settings → Developer settings → Fine-grained tokens，需勾選 Actions: Write）：');
    if (!token) return;
    token = token.trim();
    localStorage.setItem(PAT_KEY, token);
  }

  const btn   = document.getElementById('fetch-btn');
  const icon  = document.getElementById('fetch-icon');
  const label = document.getElementById('fetch-label');
  btn.disabled = true;

  try {
    const res = await fetch(GH_DISPATCH, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ ref: 'main' }),
    });

    if (res.status === 204) {
      // Actions 觸發成功，倒數 75 秒後自動刷新
      let secs = 75;
      icon.classList.add('spin');
      label.textContent = `${secs}s`;
      _fetchTimer = setInterval(() => {
        secs--;
        label.textContent = secs > 0 ? `${secs}s` : '讀取中…';
        if (secs <= 0) {
          clearInterval(_fetchTimer); _fetchTimer = null;
          label.textContent = '重抓';
          icon.classList.remove('spin');
          btn.disabled = false;
          manualRefresh();
        }
      }, 1000);
    } else if (res.status === 401 || res.status === 403) {
      localStorage.removeItem(PAT_KEY);
      alert('Token 無效或已過期，已清除，下次重抓時請重新輸入。');
      btn.disabled = false;
    } else {
      const txt = await res.text().catch(() => '');
      alert(`觸發失敗（HTTP ${res.status}）\n${txt.slice(0, 150)}`);
      btn.disabled = false;
    }
  } catch {
    alert('網路錯誤，請確認連線後再試。');
    btn.disabled = false;
  }
}

// 長按 1.5s 清除已儲存的 Token
document.getElementById('fetch-btn').addEventListener('pointerdown', () => {
  _longFired = false;
  _longTimer = setTimeout(() => {
    _longFired = true;
    if (localStorage.getItem(PAT_KEY) && confirm('清除已儲存的 GitHub Token？')) {
      localStorage.removeItem(PAT_KEY);
    }
  }, 1500);
});
['pointerup', 'pointerleave', 'pointercancel'].forEach(ev =>
  document.getElementById('fetch-btn').addEventListener(ev, () => clearTimeout(_longTimer))
);
document.getElementById('fetch-btn').addEventListener('click', () => {
  if (_longFired) { _longFired = false; return; }
  triggerFetch();
});

async function openChart(key) {
  const modal = document.getElementById('chart-modal');
  modal.style.display = 'flex';
  document.getElementById('chart-ohlc').textContent = '';

  const cont = document.getElementById('chart-container');
  cont.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:3rem;font-size:.9rem">載入中…</div>';

  if (_chartInst) { _chartInst.remove(); _chartInst = null; }

  if (!_chartCache) {
    try {
      _chartCache = await fetch(`data/chart.json?t=${Date.now()}`).then(r => r.json());
    } catch {
      cont.innerHTML = '<div style="color:#ef4444;text-align:center;padding:3rem">K線資料載入失敗，請先觸發重抓更新資料</div>';
      return;
    }
  }

  const data = _chartCache[key];
  const names = { twii: '台股大盤 (^TWII)', etf0050: '元大台灣50 (0050)' };
  document.getElementById('chart-title').textContent = names[key] || key;

  if (!data || !data.candles || !data.candles.length) {
    cont.innerHTML = '<div style="color:#ef4444;text-align:center;padding:3rem">暫無資料</div>';
    return;
  }

  cont.innerHTML = '';
  const w = cont.clientWidth, h = cont.clientHeight || window.innerHeight - 56;

  const chart = LightweightCharts.createChart(cont, {
    width: w, height: h,
    layout:    { background: { color: '#0f172a' }, textColor: '#94a3b8' },
    grid:      { vertLines: { color: '#1e293b' }, horzLines: { color: '#1e293b' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#334155' },
    timeScale: { borderColor: '#334155', timeVisible: false },
  });
  _chartInst = chart;

  // Volume bars (bottom 22%)
  const volS = chart.addHistogramSeries({
    color: 'rgba(100,116,139,0.4)',
    priceFormat: { type: 'volume' },
    priceScaleId: 'vol',
  });
  chart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.78, bottom: 0 } });
  volS.setData(data.volume || []);

  // MA lines
  const mkLine = (color, title) => chart.addLineSeries({
    color, lineWidth: 1, title,
    lastValueVisible: false, priceLineVisible: false,
    crosshairMarkerVisible: false,
  });
  mkLine('#f59e0b', 'MA5').setData(data.ma5  || []);
  mkLine('#60a5fa', 'MA20').setData(data.ma20 || []);
  mkLine('#c084fc', 'MA60').setData(data.ma60 || []);

  // Candlestick (紅漲綠跌)
  const candS = chart.addCandlestickSeries({
    upColor: '#dc2626', downColor: '#16a34a',
    borderUpColor: '#dc2626', borderDownColor: '#16a34a',
    wickUpColor:   '#ef4444', wickDownColor:   '#22c55e',
  });
  candS.setData(data.candles);

  // Build volume lookup for tooltip
  const volMap = {};
  (data.volume || []).forEach(v => { volMap[v.time] = v.value; });

  const fv = v => v >= 1000 ? Math.round(v).toLocaleString() : v.toFixed(2);
  function showBarInfo(bar, dStr) {
    const chg  = bar.close - bar.open;
    const pct  = chg / bar.open * 100;
    const sign = chg >= 0 ? '+' : '';
    const col  = chg >= 0 ? '#ef4444' : '#22c55e';
    const vv   = volMap[dStr];
    const vStr = vv != null ? ` ｜ 量 ${data.vol_unit === '億元' ? Math.round(vv)+'億' : vv >= 10000 ? (vv/10000).toFixed(1)+'萬張' : Math.round(vv).toLocaleString()+'張'}` : '';
    document.getElementById('chart-ohlc').innerHTML =
      `<span style="color:#cbd5e1">${dStr}</span> ` +
      `開 <b>${fv(bar.open)}</b> 高 <b>${fv(bar.high)}</b> 低 <b>${fv(bar.low)}</b> 收 <b>${fv(bar.close)}</b> ` +
      `<span style="color:${col}">${sign}${fv(chg)} (${sign}${pct.toFixed(2)}%)</span>${vStr}`;
  }

  // 預設顯示最後一根（今日收盤）
  const lastBar = data.candles[data.candles.length - 1];
  showBarInfo(lastBar, lastBar.time);

  chart.subscribeCrosshairMove(param => {
    if (!param.time) { showBarInfo(lastBar, lastBar.time); return; }
    const bar = param.seriesData.get(candS);
    if (!bar) return;
    const dStr = typeof param.time === 'string'
      ? param.time
      : `${param.time.year}-${String(param.time.month).padStart(2,'0')}-${String(param.time.day).padStart(2,'0')}`;
    showBarInfo(bar, dStr);
  });

  // Responsive resize
  const ro = new ResizeObserver(() => {
    if (_chartInst) _chartInst.applyOptions({ width: cont.clientWidth, height: cont.clientHeight });
  });
  ro.observe(cont);
  _chartInst._ro = ro;

  chart.timeScale().fitContent();
}

function closeChart() {
  document.getElementById('chart-modal').style.display = 'none';
  document.getElementById('stock-margin-section').style.display = 'none';
  if (_chartInst) {
    if (_chartInst._ro) _chartInst._ro.disconnect();
    _chartInst.remove();
    _chartInst = null;
  }
  if (_stockChart2) { _stockChart2.remove(); _stockChart2 = null; }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeChart(); });

    const dStr = typeof param.time === 'string' ? param.time
      : `${param.time.year}-${String(param.time.month).padStart(2,'0')}-${String(param.time.day).padStart(2,'0')}`;
    showBarInfo(bar, dStr);
  });

  const ro = new ResizeObserver(() => {
    if (_chartInst) _chartInst.applyOptions({ width: cont.clientWidth, height: cont.clientHeight });
  });
  ro.observe(cont);
  _chartInst._ro = ro;
  chart.timeScale().fitContent();

  // 台股才顯示融資餘額
  if (!symbol.endsWith('.TW')) return;

  if (!_stockMargin) {
    try {
      _stockMargin = await fetch(`data/stock_margin.json?t=${Date.now()}`).then(r => r.json());
    } catch { _stockMargin = {}; }
  }

  const code   = symbol.replace('.TW', '');
  const mData  = _stockMargin.stocks && _stockMargin.stocks[code];
  if (!mData || !mData.series || !mData.series.length) return;

  const ms = document.getElementById('stock-margin-section');
  ms.style.display = 'flex';
  renderStockMarginChart(mData.series);
}

function renderStockMarginChart(series) {
  if (_stockChart2) { _stockChart2.remove(); _stockChart2 = null; }
  const cont = document.getElementById('stock-margin-chart');
  if (!cont || cont.clientWidth === 0) return;

  const latest = series[series.length - 1];
  const prev   = series.length >= 2 ? series[series.length - 2] : null;
  const diff   = prev ? latest.value - prev.value : 0;
  const sign   = diff >= 0 ? '+' : '';
  const col    = diff > 0 ? '#ef4444' : diff < 0 ? '#22c55e' : '#94a3b8';
  document.getElementById('stock-margin-info').innerHTML =
    `${latest.value.toLocaleString()} 張 ` +
    `<span style="color:${col}">${sign}${diff.toLocaleString()}</span> ` +
    `<span style="color:#64748b">${latest.time.slice(5).replace('-','/')}</span>`;

  const chart = LightweightCharts.createChart(cont, {
    width:  cont.clientWidth, height: 130,
    layout:    { background: { color: '#0f172a' }, textColor: '#94a3b8' },
    grid:      { vertLines: { color: '#1e293b' }, horzLines: { color: '#1e293b' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#334155' },
    timeScale: { borderColor: '#334155', timeVisible: false, fixLeftEdge: true, fixRightEdge: true },
    handleScroll: { mouseWheel: false, pressedMouseMove: true },
    handleScale:  { mouseWheel: false, pinch: false },
  });
  _stockChart2 = chart;

  // MA10
  if (series.length >= 10) {
    const ma10 = [];
    for (let i = 9; i < series.length; i++) {
      const avg = series.slice(i - 9, i + 1).reduce((s, v) => s + v.value, 0) / 10;
      ma10.push({ time: series[i].time, value: Math.round(avg) });
    }
    chart.addLineSeries({ color:'#60a5fa', lineWidth:1, title:'MA10',
      priceLineVisible:false, lastValueVisible:false, crosshairMarkerVisible:false,
    }).setData(ma10);
  }

  const lineSeries = chart.addLineSeries({
    color: '#f59e0b', lineWidth: 2,
    priceFormat: { type: 'price', precision: 0, minMove: 1 },
    priceLineVisible: false, lastValueVisible: true,
  });
  lineSeries.setData(series);

  chart.subscribeCrosshairMove(param => {
    if (!param.time || !param.seriesData.get(lineSeries)) {
      document.getElementById('stock-margin-info').innerHTML =
        `${latest.value.toLocaleString()} 張 <span style="color:${col}">${sign}${diff.toLocaleString()}</span> ` +
        `<span style="color:#64748b">${latest.time.slice(5).replace('-','/')}</span>`;
      return;
    }
    const v = param.seriesData.get(lineSeries).value;
    const t = typeof param.time === 'string' ? param.time
      : `${param.time.year}-${String(param.time.month).padStart(2,'0')}-${String(param.time.day).padStart(2,'0')}`;
    document.getElementById('stock-margin-info').innerHTML =
      `${v.toLocaleString()} 張 <span style="color:#64748b">${t.slice(5).replace('-','/')}</span>`;
  });

  new ResizeObserver(() => {
    if (_stockChart2) _stockChart2.applyOptions({ width: cont.clientWidth });
  }).observe(cont);

  chart.timeScale().fitContent();
}

// ── 融資餘額 + 大盤K線 ───────────────────────────────────────────────────────
function initMarginChart() {
  if (_marginChart) return;
  const series = (_marginData && _marginData.series) || [];
  if (!series.length) {
    document.getElementById('margin-latest').textContent = '暫無資料';
    return;
  }

  // Info bar
  const latest = series[series.length - 1];
  const prev20 = series.length >= 20 ? series[series.length - 20] : null;
  document.getElementById('margin-updated').textContent = _marginData.updated ? `（${_marginData.updated}）` : '';
  document.getElementById('margin-latest').textContent =
    `${latest.value.toLocaleString('en-US', {minimumFractionDigits:1, maximumFractionDigits:1})} 億元  ${latest.time.slice(5).replace('-','/')}`;
  if (prev20) {
    const diff = Math.round(latest.value - prev20.value);
    const sign = diff >= 0 ? '+' : '';
    const col  = diff >= 0 ? '#ef4444' : '#22c55e';
    document.getElementById('margin-change').innerHTML =
      `月比 <span style="color:${col}">${sign}${diff.toLocaleString()} 億</span>`;
  }

  const marginCont = document.getElementById('margin-chart');
  if (!marginCont || marginCont.clientWidth === 0) return;
  const w = marginCont.clientWidth;

  // ── TWII K線圖 ──
  const klineCont = document.getElementById('twii-kline-chart');
  const twiiData  = _chartCache && _chartCache.twii;

  if (klineCont && twiiData && twiiData.candles && twiiData.candles.length) {
    const kChart = LightweightCharts.createChart(klineCont, {
      width:  w,
      height: 180,
      layout:    { background: { color: '#1e293b' }, textColor: '#94a3b8' },
      grid:      { vertLines: { color: '#334155' }, horzLines: { color: '#334155' } },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#334155' },
      timeScale: { borderColor: '#334155', timeVisible: false },
      handleScroll: { mouseWheel: false, pressedMouseMove: true },
      handleScale:  { mouseWheel: false, pinch: false },
    });
    _klineChart = kChart;

    const volS = kChart.addHistogramSeries({
      color: 'rgba(100,116,139,0.4)', priceFormat: { type: 'volume' }, priceScaleId: 'vol',
    });
    kChart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.78, bottom: 0 } });
    volS.setData(twiiData.volume || []);

    const mkLine = (color, title) => kChart.addLineSeries({
      color, lineWidth: 1, title,
      lastValueVisible: false, priceLineVisible: false, crosshairMarkerVisible: false,
    });
    mkLine('#f59e0b', 'MA5').setData(twiiData.ma5  || []);
    mkLine('#60a5fa', 'MA20').setData(twiiData.ma20 || []);
    mkLine('#c084fc', 'MA60').setData(twiiData.ma60 || []);

    const candS = kChart.addCandlestickSeries({
      upColor: '#dc2626', downColor: '#16a34a',
      borderUpColor: '#dc2626', borderDownColor: '#16a34a',
      wickUpColor:   '#ef4444', wickDownColor:   '#22c55e',
    });
    candS.setData(twiiData.candles);

    const volMap = {};
    (twiiData.volume || []).forEach(v => { volMap[v.time] = v.value; });

    const fv = v => v >= 1000 ? Math.round(v).toLocaleString() : v.toFixed(2);
    const lastBar = twiiData.candles[twiiData.candles.length - 1];

    function showKlineInfo(bar, dStr) {
      const chg  = bar.close - bar.open;
      const pct  = chg / bar.open * 100;
      const sign = chg >= 0 ? '+' : '';
      const col  = chg >= 0 ? '#ef4444' : '#22c55e';
      const vv   = volMap[dStr];
      const vStr = vv != null ? ` 量${Math.round(vv)}億` : '';
      document.getElementById('kline-ohlc').innerHTML =
        `${dStr.slice(5).replace('-','/')} ` +
        `開<b>${fv(bar.open)}</b> 高<b>${fv(bar.high)}</b> 低<b>${fv(bar.low)}</b> 收<b>${fv(bar.close)}</b> ` +
        `<span style="color:${col}">${sign}${fv(chg)}(${sign}${pct.toFixed(1)}%)</span>${vStr}`;
    }
    showKlineInfo(lastBar, lastBar.time);

    kChart.subscribeCrosshairMove(param => {
      if (!param.time) { showKlineInfo(lastBar, lastBar.time); return; }
      const bar = param.seriesData.get(candS);
      if (!bar) return;
      const dStr = typeof param.time === 'string' ? param.time
        : `${param.time.year}-${String(param.time.month).padStart(2,'0')}-${String(param.time.day).padStart(2,'0')}`;
      showKlineInfo(bar, dStr);
    });

    // 初始顯示融資餘額的時間範圍
    try {
      kChart.timeScale().setVisibleRange({ from: series[0].time, to: series[series.length - 1].time });
    } catch(e) {
      kChart.timeScale().fitContent();
    }

    new ResizeObserver(() => {
      if (_klineChart) _klineChart.applyOptions({ width: klineCont.clientWidth });
    }).observe(klineCont);

  } else if (klineCont) {
    klineCont.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:1.5rem;font-size:.8rem">K線資料未載入，請觸發重抓</div>';
  }

  // ── 融資餘額線圖 ──
  const chart = LightweightCharts.createChart(marginCont, {
    width:  w,
    height: 130,
    layout:    { background: { color: '#1e293b' }, textColor: '#94a3b8' },
    grid:      { vertLines: { color: '#334155' }, horzLines: { color: '#334155' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#334155' },
    timeScale: { borderColor: '#334155', timeVisible: false, fixLeftEdge: true, fixRightEdge: true },
    handleScroll: { mouseWheel: false, pressedMouseMove: true },
    handleScale:  { mouseWheel: false, pinch: false },
  });
  _marginChart = chart;

  if (series.length >= 20) {
    const ma20data = [];
    for (let i = 19; i < series.length; i++) {
      const avg = series.slice(i - 19, i + 1).reduce((s, v) => s + v.value, 0) / 20;
      ma20data.push({ time: series[i].time, value: Math.round(avg * 10) / 10 });
    }
    chart.addLineSeries({
      color: '#60a5fa', lineWidth: 1, title: 'MA20',
      priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
    }).setData(ma20data);
  }

  const lineSeries = chart.addLineSeries({
    color: '#f59e0b', lineWidth: 2,
    priceFormat: { type: 'price', precision: 1, minMove: 0.1 },
    priceLineVisible: false, lastValueVisible: true,
  });
  lineSeries.setData(series);

  chart.subscribeCrosshairMove(param => {
    if (!param.time || !param.seriesData.get(lineSeries)) {
      document.getElementById('margin-latest').textContent =
        `${latest.value.toLocaleString('en-US', {minimumFractionDigits:1, maximumFractionDigits:1})} 億元  ${latest.time.slice(5).replace('-','/')}`;
      return;
    }
    const v = param.seriesData.get(lineSeries).value;
    const t = typeof param.time === 'string' ? param.time
      : `${param.time.year}-${String(param.time.month).padStart(2,'0')}-${String(param.time.day).padStart(2,'0')}`;
    document.getElementById('margin-latest').textContent =
      `${v.toLocaleString('en-US', {minimumFractionDigits:1, maximumFractionDigits:1})} 億元  ${t.slice(5).replace('-','/')}`;
  });

  new ResizeObserver(() => {
    if (_marginChart) _marginChart.applyOptions({ width: marginCont.clientWidth });
  }).observe(marginCont);

  chart.timeScale().fitContent();
}

document.getElementById('tw-tab').addEventListener('shown.bs.tab', () => {
  if (_marginData && !_marginChart) initMarginChart();
});

// ── 初始化 ────────────────────────────────────────────────────────────────────
updateClock();
updateTags();
initTab();
setInterval(() => { updateClock(); updateTags(); }, 30000);
loadAll().catch(() => {
  document.getElementById('last-update').textContent = '資料載入失敗，請稍後再試';
});
</script>
</body>
