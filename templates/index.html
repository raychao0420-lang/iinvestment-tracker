<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>投資小幫手</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  :root {
    --up:   #dc2626;
    --down: #16a34a;
    --flat: #6b7280;
  }

  body { background: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  /* ── 頁頭 */
  .top-bar {
    background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
    color: #fff;
    padding: .6rem 1rem;
    position: sticky; top: 0; z-index: 99;
    display: flex; align-items: center; justify-content: space-between;
  }
  .top-bar h1 { font-size: 1.15rem; font-weight: 700; margin: 0; letter-spacing: .02em; }
  .top-bar .time-badge {
    font-size: .75rem; background: rgba(255,255,255,.15);
    border-radius: 99px; padding: .2rem .65rem; white-space: nowrap;
  }

  /* ── Tab 列 */
  .market-tabs .nav-link {
    font-size: 1rem; font-weight: 600; padding: .55rem 1.1rem;
    border-radius: 0; border-bottom: 3px solid transparent;
    color: #475569;
  }
  .market-tabs .nav-link.active {
    color: #1d4ed8; border-bottom-color: #1d4ed8; background: none;
  }
  .market-tabs { background: #fff; border-bottom: 1px solid #e2e8f0; }
  .market-tabs .badge-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 5px; vertical-align: middle;
  }
  .dot-us   { background: #f59e0b; }
  .dot-tw   { background: #10b981; }
  .dot-jp   { background: #f43f5e; }

  /* ── 區塊標題 */
  .section-title {
    font-size: .72rem; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; color: #94a3b8; padding: .6rem 1rem .3rem;
  }

  /* ── 股票卡片（手機：一行一張） */
  .stock-card {
    background: #fff; border-radius: 12px; padding: .85rem 1rem;
    margin: .4rem .75rem; box-shadow: 0 1px 3px rgba(0,0,0,.07);
    display: flex; align-items: center; justify-content: space-between;
  }
  .stock-name  { font-size: 1.05rem; font-weight: 600; color: #1e293b; }
  .stock-sub   { font-size: .78rem; color: #94a3b8; margin-top: 1px; }
  .stock-price { font-size: 1.35rem; font-weight: 700; text-align: right; }
  .stock-chg   { font-size: .88rem; font-weight: 600; text-align: right; margin-top: 2px; }

  .up   { color: var(--up); }
  .down { color: var(--down); }
  .flat { color: var(--flat); }

  .chg-badge {
    display: inline-block; font-size: .8rem; font-weight: 700;
    padding: .18rem .55rem; border-radius: 6px; margin-top: 3px;
  }
  .chg-badge.up   { background: #fee2e2; color: var(--up); }
  .chg-badge.down { background: #dcfce7; color: var(--down); }
  .chg-badge.flat { background: #f1f5f9; color: var(--flat); }

  /* ── 指數大卡 */
  .idx-card {
    background: #fff; border-radius: 12px; padding: 1rem 1.1rem;
    margin: .4rem .75rem; box-shadow: 0 1px 3px rgba(0,0,0,.07);
  }
  .idx-name  { font-size: .85rem; color: #64748b; font-weight: 600; }
  .idx-price { font-size: 1.6rem; font-weight: 800; margin: .1rem 0; }
  .idx-chg   { font-size: .9rem; font-weight: 600; }

  /* 電腦版：指數兩欄，股票三欄 */
  @media (min-width: 768px) {
    .idx-grid  { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; }
    .stock-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; }
    .idx-card  { margin: .4rem; }
    .stock-card { margin: .4rem; }
    .stock-name  { font-size: 1rem; }
    .stock-price { font-size: 1.25rem; }
  }
  @media (min-width: 1200px) {
    .stock-grid { grid-template-columns: repeat(3, 1fr); }
    .idx-grid   { grid-template-columns: repeat(4, 1fr); }
  }

  /* ── 更新列 */
  .update-bar {
    background: #fff; border-top: 1px solid #e2e8f0;
    text-align: center; padding: .6rem; font-size: .8rem; color: #94a3b8;
    position: sticky; bottom: 0;
  }
  #refresh-btn {
    border: none; background: none; cursor: pointer;
    font-size: .8rem; color: #3b82f6; padding: 0 .4rem;
  }
  .spinner { display: none; }
  .loading .spinner { display: inline-block; }

  /* ── 骨架 */
  .skeleton { background: linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite;
    border-radius: 6px; height: 1.2em; width: 70%; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* ── 更新時段提示 */
  .session-tag {
    font-size: .7rem; font-weight: 700; letter-spacing: .05em;
    padding: .15rem .5rem; border-radius: 99px; margin-left: .4rem;
    vertical-align: middle;
  }
  .tag-live  { background: #dcfce7; color: #16a34a; }
  .tag-wait  { background: #fef3c7; color: #b45309; }
  .tag-close { background: #f1f5f9; color: #94a3b8; }
</style>
</head>
<body>

<!-- 頁頭 -->
<div class="top-bar">
  <h1><i class="bi bi-bar-chart-fill me-2" style="color:#60a5fa"></i>投資小幫手</h1>
  <span class="time-badge" id="clock">{{ now }}</span>
</div>

<!-- Tab -->
<ul class="nav market-tabs px-1" id="marketTabs" role="tablist">
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="us-tab" data-bs-toggle="tab" data-bs-target="#us-panel"
            type="button" role="tab">
      <span class="badge-dot dot-us"></span>美股
      <span class="session-tag" id="us-tag"></span>
    </button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="tw-tab" data-bs-toggle="tab" data-bs-target="#tw-panel"
            type="button" role="tab">
      <span class="badge-dot dot-tw"></span>台股
      <span class="session-tag" id="tw-tag"></span>
    </button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="jp-tab" data-bs-toggle="tab" data-bs-target="#jp-panel"
            type="button" role="tab">
      <span class="badge-dot dot-jp"></span>日股
      <span class="session-tag" id="jp-tag"></span>
    </button>
  </li>
</ul>

<!-- 內容 -->
<div class="tab-content pb-4">

  <!-- 美股 -->
  <div class="tab-pane fade" id="us-panel" role="tabpanel">
    <div class="section-title">指數</div>
    <div class="idx-grid" id="us-indices">
      <div class="idx-card"><div class="skeleton"></div></div>
    </div>
    <div class="section-title mt-1">台灣相關 & ETF</div>
    <div class="stock-grid" id="us-stocks">
      <div class="stock-card"><div class="skeleton"></div></div>
    </div>
  </div>

  <!-- 台股 -->
  <div class="tab-pane fade" id="tw-panel" role="tabpanel">
    <div class="section-title">指數</div>
    <div class="idx-grid" id="tw-indices">
      <div class="idx-card"><div class="skeleton"></div></div>
    </div>
    <div class="section-title mt-1">個股</div>
    <div class="stock-grid" id="tw-stocks">
      <div class="stock-card"><div class="skeleton"></div></div>
    </div>
    <div class="section-title mt-1">ETF</div>
    <div class="stock-grid" id="tw-etf">
      <div class="stock-card"><div class="skeleton"></div></div>
    </div>
  </div>

  <!-- 日股 -->
  <div class="tab-pane fade" id="jp-panel" role="tabpanel">
    <div class="section-title">指數</div>
    <div class="idx-grid" id="jp-indices">
      <div class="idx-card"><div class="skeleton"></div></div>
    </div>
    <div class="section-title mt-1">半導體相關</div>
    <div class="stock-grid" id="jp-stocks">
      <div class="stock-card"><div class="skeleton"></div></div>
    </div>
  </div>

</div>

<!-- 底部更新列 -->
<div class="update-bar">
  <span id="last-update">載入中…</span>
  <button id="refresh-btn" onclick="refreshAll()">
    <i class="bi bi-arrow-clockwise"></i> 重新整理
  </button>
  <span class="spinner"><i class="bi bi-arrow-clockwise spin"></i></span>
</div>

<style>
.spin { display:inline-block; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── 時間 / Tab 邏輯 ──────────────────────────────────────────────────────────
function getTWHour() {
  return new Date(new Date().toLocaleString('en-US', {timeZone: 'Asia/Taipei'})).getHours();
}
function getTWMin() {
  const d = new Date(new Date().toLocaleString('en-US', {timeZone: 'Asia/Taipei'}));
  return d.getHours() * 60 + d.getMinutes();
}

function updateClock() {
  const d = new Date(new Date().toLocaleString('en-US', {timeZone: 'Asia/Taipei'}));
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent =
    `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function updateTags() {
  const m = getTWMin();
  // 美股：前一天收盤，台灣時間 6:00–14:00 視為「剛收盤」
  const usEl = document.getElementById('us-tag');
  const twEl = document.getElementById('tw-tag');
  const jpEl = document.getElementById('jp-tag');

  // 美股：4:30-7:00 最新, 7:00-14:00 已更新
  if (m >= 6*60 && m < 7*60)       { usEl.textContent='最新'; usEl.className='session-tag tag-live'; }
  else if (m >= 7*60 && m < 14*60) { usEl.textContent='已更新'; usEl.className='session-tag tag-wait'; }
  else                               { usEl.textContent=''; }

  // 台股：9:00-13:30 盤中, 13:30-17:00 已收盤
  if (m >= 9*60 && m < 13*60+30)   { twEl.textContent='盤中'; twEl.className='session-tag tag-live'; }
  else if (m >= 13*60+30 && m < 17*60) { twEl.textContent='已收盤'; twEl.className='session-tag tag-wait'; }
  else                               { twEl.textContent=''; }

  // 日股：9:00-15:30 盤中 (JST = TWN+1h)，台灣時間 8:00-14:30
  if (m >= 8*60 && m < 14*60+30)   { jpEl.textContent='盤中'; jpEl.className='session-tag tag-live'; }
  else if (m >= 14*60+30 && m < 17*60) { jpEl.textContent='已收盤'; jpEl.className='session-tag tag-wait'; }
  else                               { jpEl.textContent=''; }
}

// 依時間決定預設 Tab
function initTab() {
  const m = getTWMin();
  let tab;
  if (m >= 5*60 && m < 14*60)         tab = 'us-tab';   // 5am~2pm 看美股
  else if (m >= 14*60 && m < 17*60)   tab = 'tw-tab';   // 2pm~5pm 看台股
  else if (m >= 17*60 && m < 20*60)   tab = 'jp-tab';   // 5pm~8pm 看日股
  else                                  tab = 'tw-tab';   // 其餘預設台股
  bootstrap.Tab.getOrCreateInstance(document.getElementById(tab)).show();
}

// ── 渲染工具 ─────────────────────────────────────────────────────────────────
function cls(pct) {
  if (pct === null || pct === undefined) return 'flat';
  return pct > 0 ? 'up' : pct < 0 ? 'down' : 'flat';
}
function arrow(pct) {
  if (pct === null || pct === undefined) return '';
  return pct > 0 ? '▲' : pct < 0 ? '▼' : '–';
}
function fmt(val, digits=2) {
  if (val === null || val === undefined) return '–';
  return Number(val).toLocaleString('en-US', {minimumFractionDigits: digits, maximumFractionDigits: digits});
}
function fmtChg(chg, pct) {
  if (pct === null || pct === undefined) return '–';
  const sign = pct >= 0 ? '+' : '';
  return `${sign}${fmt(chg)} (${sign}${fmt(pct)}%)`;
}

function renderIdx(items, containerId) {
  const el = document.getElementById(containerId);
  el.innerHTML = items.map(s => {
    const c = cls(s.pct);
    return `
    <div class="idx-card">
      <div class="idx-name">${s.name}</div>
      <div class="idx-price ${c}">${fmt(s.price, s.price > 999 ? 0 : 2)}</div>
      <div class="idx-chg ${c}">${arrow(s.pct)} ${fmtChg(s.change, s.pct)}
        <span style="color:#94a3b8;font-size:.75rem;margin-left:.3rem">${s.date||''}</span>
      </div>
    </div>`;
  }).join('');
}

function renderStocks(items, containerId) {
  const el = document.getElementById(containerId);
  el.innerHTML = items.map(s => {
    const c = cls(s.pct);
    const badgeSign = s.pct >= 0 ? '+' : '';
    const badge = s.pct !== null
      ? `<span class="chg-badge ${c}">${arrow(s.pct)} ${badgeSign}${fmt(s.pct)}%</span>`
      : `<span class="chg-badge flat">–</span>`;
    const digits = s.price && s.price > 999 ? 0 : 2;
    return `
    <div class="stock-card">
      <div>
        <div class="stock-name">${s.name}</div>
        <div class="stock-sub">${s.symbol} · ${s.date||'–'}</div>
      </div>
      <div>
        <div class="stock-price ${c}">${fmt(s.price, digits)}</div>
        <div style="text-align:right">${badge}</div>
      </div>
    </div>`;
  }).join('');
}

// ── 資料載入 ─────────────────────────────────────────────────────────────────
let loading = false;

async function loadSection(api, renderFn) {
  const res = await fetch(api);
  const data = await res.json();
  renderFn(data);
}

function setLoading(on) {
  loading = on;
  document.querySelector('.spinner').style.display = on ? 'inline' : 'none';
  document.getElementById('refresh-btn').style.display = on ? 'none' : 'inline';
}

async function refreshAll() {
  if (loading) return;
  setLoading(true);
  document.getElementById('last-update').textContent = '更新中…';

  try {
    await Promise.all([
      loadSection('/api/us', d => {
        renderIdx(d.indices, 'us-indices');
        renderStocks(d.stocks, 'us-stocks');
      }),
      loadSection('/api/tw', d => {
        renderIdx(d.indices, 'tw-indices');
        renderStocks(d.stocks, 'tw-stocks');
        renderStocks(d.etf, 'tw-etf');
      }),
      loadSection('/api/jp', d => {
        renderIdx(d.indices, 'jp-indices');
        renderStocks(d.stocks, 'jp-stocks');
      }),
    ]);
    const now = new Date(new Date().toLocaleString('en-US', {timeZone: 'Asia/Taipei'}));
    const pad = n => String(n).padStart(2,'0');
    document.getElementById('last-update').textContent =
      `更新：${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  } catch(e) {
    document.getElementById('last-update').textContent = '載入失敗，請重試';
  }
  setLoading(false);
}

// ── 自動刷新（每 5 分鐘）────────────────────────────────────────────────────
setInterval(refreshAll, 5 * 60 * 1000);
setInterval(() => { updateClock(); updateTags(); }, 30 * 1000);

// ── 初始化 ───────────────────────────────────────────────────────────────────
updateClock();
updateTags();
initTab();
refreshAll();
</script>
</body>
</html>
