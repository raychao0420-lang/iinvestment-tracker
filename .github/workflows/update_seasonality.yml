name: Update Seasonality Data

on:
  schedule:
    - cron: '0 8 2 * *'   # 每月 2 號 08:00 UTC（16:00 台灣）；等上月完全收盤後再抓月線
  workflow_dispatch:        # 手動觸發

concurrency:
  group: update-seasonality
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pytz requests

      - name: Fetch seasonality data (US)
        run: python fetch_seasonality.py

      - name: Fetch seasonality data (TW)
        run: python fetch_seasonality_tw.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seasonality.json data/seasonality_tw.json
          git diff --staged --quiet && echo "no changes" && exit 0
          git commit -m "seasonality: $(date -u '+%Y-%m-%d %H:%M UTC')"
          for attempt in 1 2 3; do
            git push && exit 0
            echo "push attempt $attempt failed, pulling and retrying..."
            sleep 5
            git pull --rebase -X theirs
          done
          git push
