name: Update Futures Live

on:
  workflow_dispatch:
  schedule:
    - cron: '50 20 * * 1-5'   # 04:50 台灣時間 週二~六（夜盤收盤前 10 分，MIS 即時捕價）
    - cron: '5 21 * * 1-5'    # 05:05 台灣時間 週二~六（夜盤收盤後 5 分，OpenAPI 取結算價）
    - cron: '30 21 * * 1-5'   # 05:30 台灣時間 週二~六（夜盤收盤後 30 分，補抓保底）
    - cron: '5 22 * * 1-5'    # 06:05 台灣時間 週二~六（夜盤收盤後 1h5m，OpenAPI 應已更新）
    - cron: '10 23 * * 0-4'   # 07:10 台灣時間 / 08:10 JST 週二~六（早報前 1h20m）
    - cron: '25 23 * * 0-4'   # 07:25 台灣時間 / 08:25 JST 週二~六（早報前 5 分，最終保底）
    - cron: '*/15 1-5 * * 1-5' # 09:00-13:45 台灣時間 週一~五（日盤盤中，每 15 分）
    - cron: '*/30 7-20 * * 1-5' # 15:00-04:30 台灣時間 週一~五（夜盤時段，每 30 分）

concurrency:
  group: update-futures-live
  cancel-in-progress: false

jobs:
  update-futures-live:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Fetch futures live data
        run: python fetch_futures_live.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tw_futures.json
          git diff --staged --quiet && echo "no changes" && exit 0
          git commit -m "data: futures live $(date -u '+%H:%M UTC')"
          for attempt in 1 2 3; do
            git push && exit 0
            echo "push attempt $attempt failed, retrying..."
            sleep 3
            git pull --rebase || {
              git checkout --theirs data/tw_futures.json
              git add data/tw_futures.json
              GIT_EDITOR=true git rebase --continue
            }
          done
          git push
