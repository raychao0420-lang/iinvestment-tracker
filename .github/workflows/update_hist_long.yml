name: Update Long History Data

on:
  schedule:
    - cron: '30 20 * * 6'   # 每週六 20:30 UTC（週日 04:30 台灣），週末收盤後更新完整歷史
  workflow_dispatch:         # 手動觸發

concurrency:
  group: update-hist-long
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch long history (Yahoo v8, 清理分割/假跳動)
        run: node tools/fetch_hist_long.js

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hist_long.json
          git diff --staged --quiet && echo "no changes" && exit 0
          git commit -m "hist_long: $(date -u '+%Y-%m-%d %H:%M UTC')"
          for attempt in 1 2 3; do
            git push && exit 0
            echo "push attempt $attempt failed, pulling and retrying..."
            sleep 5
            git pull --rebase -X theirs
          done
          git push
